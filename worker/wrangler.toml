name = "pim-agent-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# Secrets (set via wrangler, never commit):
#   wrangler secret put MCP_URL
#   wrangler secret put MCP_AUTH_HEADER   # optional, "HeaderName:HeaderValue"
#   wrangler secret put SHARED_SECRET
#   wrangler secret put WEBHOOK_SECRET    # AI Conversion Engine: the `secret`
#                                         # of the Bluestone webhook; the engine
#                                         # verifies x-bs-signature against it.

# AI Conversion Engine: KV store for the conversion rules the console saves and
# the /api/webhook receiver reads. The engine needs this to store rules — but it
# stays commented out so `wrangler deploy` works immediately (a placeholder id
# would make the deploy fail). Enable it in two steps:
#   1. wrangler kv namespace create RULES
#   2. uncomment the three lines below and paste the printed id
# [[kv_namespaces]]
# binding = "RULES"
# id = "PASTE_KV_NAMESPACE_ID_HERE"
