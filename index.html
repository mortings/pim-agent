<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic PIM</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050D1F;--surface:#0C1829;--surface2:#111F35;--border:rgba(255,255,255,0.08);
  --blue:#3D74F4;--electric:#0F05CC;--orange:#EC672B;--green:#34D399;--red:#EB485E;
  --yellow:#FBE74D;--purple:#A78BFF;--white:#fff;--muted:rgba(255,255,255,0.45);
  --text:rgba(255,255,255,0.85);--radius:10px;
}
html,body{height:100%;font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* LAYOUT */
#app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
#header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px}
#sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#main{display:flex;flex-direction:column;overflow:hidden;position:relative}

/* HEADER */
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--white)}
.logo svg{width:24px;height:24px}
.env-badge{font-size:10px;background:rgba(236,103,43,0.15);color:var(--orange);padding:2px 10px;border-radius:100px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
#new-chat-btn{display:flex;align-items:center;gap:6px;background:rgba(61,116,244,0.12);border:1px solid rgba(61,116,244,0.3);color:#8BAAFF;font-size:12px;font-weight:600;padding:6px 14px;border-radius:100px;cursor:pointer;transition:all 0.15s;font-family:'Montserrat',sans-serif}
#new-chat-btn:hover{background:rgba(61,116,244,0.25);border-color:rgba(61,116,244,0.5);color:var(--white)}
.header-stats{margin-left:auto;display:flex;gap:16px;font-size:12px;color:var(--muted)}
.header-stats .val{font-weight:700;color:var(--white)}

/* SIDEBAR */
.sidebar-section{padding:12px}
.sidebar-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.sidebar-scroll{flex:1;overflow-y:auto;padding:4px 0}
.cat-item{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all 0.15s}
.cat-item:hover{background:rgba(255,255,255,0.05)}
.cat-item.active{background:rgba(61,116,244,0.15);color:var(--blue)}
.cat-item .cnt{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}
.cat-item .indent{width:16px;flex-shrink:0}

.label-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s}
.label-item:hover{background:rgba(255,255,255,0.05)}
.label-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.label-item .cnt{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}

.sidebar-divider{height:1px;background:var(--border);margin:4px 12px}

/* CHAT */
#chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}

.msg{max-width:88%;animation:msgIn 0.25s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.user .bubble{background:linear-gradient(135deg,var(--blue),var(--electric));color:var(--white);border-radius:14px 14px 4px 14px;padding:10px 16px;font-size:14px}
.msg.system{align-self:flex-start;max-width:95%}
.msg.system .bubble{background:var(--surface2);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:14px 18px;font-size:14px}
.msg .time{font-size:10px;color:rgba(255,255,255,0.2);margin-top:3px;padding:0 4px}
.msg.user .time{text-align:right}

/* Typing */
.typing{display:flex;gap:4px;padding:14px 18px;align-self:flex-start}
.typing span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Suggestion chips */
.suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:rgba(61,116,244,0.1);border:1px solid rgba(61,116,244,0.25);color:#8BAAFF;font-size:12px;font-weight:600;padding:6px 14px;border-radius:100px;cursor:pointer;transition:all 0.15s;font-family:'Montserrat',sans-serif}
.chip:hover{background:rgba(61,116,244,0.2);border-color:rgba(61,116,244,0.45)}

/* Tables in chat */
.msg-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.msg-table th{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);font-weight:700;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.msg-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03)}
.msg-table tbody tr{cursor:pointer;transition:background 0.1s}
.msg-table tbody tr:hover{background:rgba(61,116,244,0.08)}
.sku{font-family:'Courier New',monospace;font-size:11px;color:var(--muted)}
.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase}
.status-active{background:rgba(52,211,153,0.13);color:var(--green)}
.status-draft{background:rgba(251,231,77,0.13);color:var(--yellow)}
.status-archived{background:rgba(255,255,255,0.06);color:var(--muted)}

/* Label tags */
.label-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin:1px 2px}
.label-tag .remove-label{cursor:pointer;opacity:0.6;font-size:12px;margin-left:2px}
.label-tag .remove-label:hover{opacity:1}

/* Change preview */
.change-preview{border:2px solid var(--blue);border-radius:var(--radius);overflow:hidden;margin:10px 0}
.change-preview.destructive{border-color:var(--red)}
.change-preview-hdr{padding:10px 14px;font-weight:700;font-size:12px;display:flex;align-items:center;gap:8px}
.change-preview:not(.destructive) .change-preview-hdr{background:rgba(61,116,244,0.1);color:var(--blue)}
.change-preview.destructive .change-preview-hdr{background:rgba(235,72,94,0.1);color:var(--red)}
.change-preview-body{padding:12px 14px}
.diff-row{display:flex;gap:10px;padding:5px 0;font-size:13px;align-items:baseline}
.diff-row+.diff-row{border-top:1px solid rgba(255,255,255,0.04)}
.diff-label{width:90px;font-weight:700;color:var(--muted);font-size:11px;flex-shrink:0}
.diff-before{color:var(--red);text-decoration:line-through;flex:1}
.diff-arrow{color:var(--muted);flex-shrink:0}
.diff-after{color:var(--green);font-weight:600;flex:1}
.change-actions{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.04);display:flex;gap:8px;justify-content:flex-end}

/* Buttons */
.btn{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;padding:7px 16px;border-radius:8px;cursor:pointer;border:none;transition:all 0.15s}
.btn-confirm{background:linear-gradient(135deg,var(--blue),var(--electric));color:var(--white)}
.btn-confirm:hover{box-shadow:0 0 20px rgba(61,116,244,0.4)}
.btn-cancel{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--border)}
.btn-cancel:hover{background:rgba(255,255,255,0.1)}
.btn-danger{background:rgba(235,72,94,0.15);color:var(--red);border:1px solid rgba(235,72,94,0.3)}
.btn-danger:hover{background:rgba(235,72,94,0.25)}

/* Product card */
.product-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin:8px 0}
.product-card-name{font-weight:700;font-size:15px;margin-bottom:2px}
.product-card-sku{font-family:'Courier New',monospace;font-size:11px;color:var(--muted)}
.product-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;font-size:13px}
.field-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.3px}

/* Quality bar */
.quality-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden;margin:4px 0}
.quality-fill{height:100%;border-radius:100px;transition:width 0.5s ease}
.q-high{background:var(--green)}.q-med{background:var(--yellow)}.q-low{background:var(--red)}

/* INPUT */
#input-area{padding:12px 20px;background:var(--surface);border-top:1px solid var(--border)}
#input-wrap{display:flex;gap:8px;align-items:center}
#prompt-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
#prompt-input:focus{border-color:var(--blue)}
#prompt-input::placeholder{color:rgba(255,255,255,0.25)}
#send-btn{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--electric));border:none;color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
#send-btn:hover{box-shadow:0 0 24px rgba(61,116,244,0.5)}
#send-btn svg{width:18px;height:18px}

/* SLIDE-OUT DETAIL PANEL */
#detail-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:50}
#detail-overlay.open{opacity:1;pointer-events:auto}
#detail-panel{position:absolute;top:0;right:0;bottom:0;width:380px;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.3s ease;z-index:51;overflow-y:auto;padding:20px}
#detail-panel.open{transform:translateX(0)}
.detail-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.06);border:none;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.detail-close:hover{background:rgba(255,255,255,0.1);color:var(--white)}
.detail-title{font-size:18px;font-weight:800;margin-bottom:4px;padding-right:40px}
.detail-sku{font-family:'Courier New',monospace;font-size:12px;color:var(--muted);margin-bottom:16px}
.detail-section{margin-bottom:16px}
.detail-section-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.detail-field{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px}
.detail-field .lbl{color:var(--muted);font-weight:500}
.detail-field .val{font-weight:600}
.detail-labels{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.detail-desc{font-size:13px;color:var(--text);line-height:1.6;background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:4px}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:200}
#modal-overlay.open{display:flex}
#modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
#modal-overlay.wide #modal-box{max-width:860px}

/* IMPORT / DRAG & DROP */
#drop-overlay{position:absolute;inset:0;background:rgba(15,5,204,0.12);border:3px dashed var(--blue);border-radius:12px;display:none;align-items:center;justify-content:center;z-index:40;pointer-events:none;backdrop-filter:blur(4px)}
#drop-overlay.active{display:flex}
.drop-content{text-align:center;padding:40px}
.drop-content svg{width:56px;height:56px;color:var(--blue);margin-bottom:12px}
.drop-content h3{font-size:18px;font-weight:700;color:var(--white);margin-bottom:4px}
.drop-content p{font-size:13px;color:var(--muted)}

.import-upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all 0.2s;margin:12px 0}
.import-upload-zone:hover{border-color:var(--blue);background:rgba(61,116,244,0.05)}
.import-upload-zone svg{width:40px;height:40px;color:var(--muted);margin-bottom:8px}
.import-upload-zone h4{font-size:14px;font-weight:700;color:var(--white);margin-bottom:4px}
.import-upload-zone p{font-size:12px;color:var(--muted)}

/* Mapping table */
.mapping-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.mapping-table th{text-align:left;padding:8px 10px;background:rgba(255,255,255,0.03);font-weight:700;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
.mapping-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03)}
.mapping-table select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;cursor:pointer;width:100%}
.mapping-table select:focus{outline:none;border-color:var(--blue)}
.mapping-table .sample-data{color:var(--muted);font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mapping-table .col-header{font-weight:700;color:var(--white)}
.mapping-table .mapped{color:var(--green)}
.mapping-table .unmapped{color:var(--muted);font-style:italic}
.mapping-status{display:flex;align-items:center;gap:6px;font-size:12px;margin:8px 0}
.mapping-status .ok{color:var(--green)}
.mapping-status .warn{color:var(--yellow)}
.mapping-status .err{color:var(--red)}

/* Import preview table */
.import-preview-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:11px}
.import-preview-table th{text-align:left;padding:6px 8px;background:rgba(61,116,244,0.08);font-weight:700;font-size:10px;color:var(--blue);text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--border)}
.import-preview-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03)}
.import-preview-table tr.row-ok td:first-child{border-left:3px solid var(--green)}
.import-preview-table tr.row-warn td:first-child{border-left:3px solid var(--yellow)}
.import-preview-table tr.row-err td:first-child{border-left:3px solid var(--red)}
.import-preview-table .cell-missing{color:var(--yellow);font-style:italic}
.import-preview-table .cell-dup{color:var(--red);font-weight:700}

.import-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.import-summary-card{border-radius:8px;padding:10px;text-align:center}
.import-summary-card .num{font-size:20px;font-weight:800}
.import-summary-card .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}

/* Upload button next to input */
#upload-btn{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
#upload-btn:hover{background:rgba(61,116,244,0.1);border-color:rgba(61,116,244,0.3);color:var(--blue)}
#upload-btn svg{width:18px;height:18px}

/* Step indicator */
.import-steps{display:flex;align-items:center;gap:0;margin-bottom:16px}
.import-step{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px}
.import-step.active{color:var(--blue)}
.import-step.done{color:var(--green)}
.import-step .step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--border);font-weight:800}
.import-step.active .step-num{border-color:var(--blue);background:rgba(61,116,244,0.15);color:var(--blue)}
.import-step.done .step-num{border-color:var(--green);background:rgba(52,211,153,0.15);color:var(--green)}
.import-step-line{width:24px;height:2px;background:var(--border);margin:0 4px}

/* Status bar */
#statusbar{grid-column:1/-1;background:var(--surface);border-top:1px solid var(--border);padding:0 20px;display:flex;align-items:center;font-size:11px;color:var(--muted);height:28px}
#statusbar .dot{width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:6px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Activity log */
.activity-entry{display:flex;gap:8px;align-items:start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px}
.activity-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.activity-time{font-size:10px;color:rgba(255,255,255,0.2);margin-top:1px}

/* Review status */
.status-review{background:rgba(167,139,255,0.13);color:var(--purple)}

/* Relationship chips */
.rel-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;margin:2px}
.rel-chip:hover{background:rgba(61,116,244,0.1);border-color:rgba(61,116,244,0.3)}
.rel-type{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0.3px}

/* History timeline */
.history-entry{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px}
.history-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.history-time{font-size:10px;color:rgba(255,255,255,0.2)}
.history-field{font-weight:600;color:var(--blue)}

/* Export toast */
.toast{position:fixed;bottom:60px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,0.4);z-index:300;animation:toastIn 0.3s ease-out;display:flex;align-items:center;gap:10px}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.toast.hide{animation:toastOut 0.3s ease-in forwards}
@keyframes toastOut{to{opacity:0;transform:translateY(20px)}}

/* Enrichment suggestion */
.enrich-card{background:rgba(167,139,255,0.06);border:1px solid rgba(167,139,255,0.2);border-radius:var(--radius);padding:12px;margin:6px 0}
.enrich-field{font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.enrich-field:last-child{border-bottom:none}
.enrich-value{color:var(--purple);font-weight:600;font-style:italic}

/* Compare grid */
.compare-grid{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:10px 0}
.compare-cell{background:var(--surface2);padding:8px 12px;font-size:12px}
.compare-header{font-weight:700;font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:0.3px}
.compare-product{font-weight:700;color:var(--blue)}
.compare-diff{color:var(--yellow)}

/* ========== MODE TOGGLE ========== */
.mode-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;height:34px}
.mode-toggle-btn{display:flex;align-items:center;gap:6px;padding:0 14px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.mode-toggle-btn:hover{color:var(--text)}
.mode-toggle-btn.active{background:linear-gradient(135deg,var(--blue),var(--electric));color:var(--white);box-shadow:0 0 12px rgba(61,116,244,0.3)}
.mode-toggle-btn svg{width:14px;height:14px}

/* ========== DATA VIEWER ========== */
#data-view{display:none;flex-direction:column;overflow:hidden;flex:1}
#data-view.active{display:flex}
#chat-area.hidden,#input-area.hidden,#drop-overlay.hidden{display:none!important}

/* Data toolbar */
.data-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.data-search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;outline:none;width:240px;transition:border-color 0.2s}
.data-search:focus{border-color:var(--blue)}
.data-search-wrap{position:relative}
.data-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);pointer-events:none}
.data-filter{display:flex;align-items:center;gap:4px}
.data-filter-btn{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;border-radius:100px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.15s}
.data-filter-btn:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.data-filter-btn.active{background:rgba(61,116,244,0.12);color:var(--blue);border-color:rgba(61,116,244,0.3)}
.data-toolbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.data-count{font-size:11px;color:var(--muted);font-weight:600}
.data-bulk-bar{display:none;align-items:center;gap:10px;padding:8px 16px;background:rgba(61,116,244,0.08);border-bottom:1px solid rgba(61,116,244,0.2);font-size:12px;font-weight:600;color:var(--blue);flex-shrink:0}
.data-bulk-bar.active{display:flex}
.data-bulk-bar .sel-count{font-weight:800}
.data-bulk-actions{display:flex;gap:6px;margin-left:auto}
.data-bulk-actions button{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;border:none;transition:all 0.15s}

/* Data grid */
.data-grid-wrap{flex:1;overflow:auto}
.data-grid{width:100%;border-collapse:collapse;font-size:12px}
.data-grid thead{position:sticky;top:0;z-index:5}
.data-grid th{text-align:left;padding:8px 12px;background:var(--surface);font-weight:700;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
.data-grid th:hover{color:var(--text)}
.data-grid th .sort-icon{font-size:9px;margin-left:4px;opacity:0.4}
.data-grid th.sorted .sort-icon{opacity:1;color:var(--blue)}
.data-grid td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background 0.1s;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.data-grid tr:hover td{background:rgba(255,255,255,0.02)}
.data-grid tr.selected td{background:rgba(61,116,244,0.06)}
.data-grid .cb-cell{width:36px;text-align:center}
.data-grid input[type="checkbox"]{accent-color:var(--blue);cursor:pointer;width:14px;height:14px}
.data-grid .sku-cell{font-family:'Courier New',monospace;font-size:11px;color:var(--muted)}
.data-grid .name-cell{font-weight:700;color:var(--white);cursor:pointer}
.data-grid .name-cell:hover{color:var(--blue);text-decoration:underline}
.data-grid .price-cell{font-weight:600;font-family:'Courier New',monospace}
.data-grid .status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;text-transform:uppercase;letter-spacing:0.3px}
.data-grid .status-active{background:rgba(52,211,153,0.13);color:var(--green)}
.data-grid .status-draft{background:rgba(251,231,77,0.13);color:var(--yellow)}
.data-grid .status-archived{background:rgba(255,255,255,0.06);color:var(--muted)}
.data-grid .label-chips{display:flex;gap:3px;flex-wrap:nowrap;overflow:hidden}
.data-grid .label-chip-sm{font-size:9px;font-weight:700;padding:1px 6px;border-radius:100px;white-space:nowrap}
.data-grid .quality-mini{width:50px;height:5px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
.data-grid .quality-mini-fill{height:100%;border-radius:100px}
.data-grid .action-btns{display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
.data-grid tr:hover .action-btns{opacity:1}
.data-grid .action-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.15s}
.data-grid .action-btn:hover{background:rgba(61,116,244,0.1);color:var(--blue);border-color:rgba(61,116,244,0.3)}
.data-grid .action-btn.danger:hover{background:rgba(235,72,94,0.1);color:var(--red);border-color:rgba(235,72,94,0.3)}

/* Inline edit */
.data-grid td.editing{padding:3px 6px;background:rgba(61,116,244,0.05)}
.inline-edit{background:var(--surface2);border:1px solid var(--blue);border-radius:4px;padding:4px 8px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;outline:none;width:100%;box-shadow:0 0 8px rgba(61,116,244,0.2)}
.inline-edit-select{background:var(--surface2);border:1px solid var(--blue);border-radius:4px;padding:4px 8px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:12px;outline:none;cursor:pointer}

/* Pending changes bar */
.changes-bar{display:none;align-items:center;gap:12px;padding:10px 16px;background:rgba(251,231,77,0.08);border-top:1px solid rgba(251,231,77,0.2);flex-shrink:0}
.changes-bar.active{display:flex}
.changes-bar .changes-text{font-size:12px;font-weight:700;color:var(--yellow)}
.changes-bar .changes-count{font-size:18px;font-weight:800;color:var(--yellow)}
.changes-bar .changes-list{flex:1;font-size:11px;color:var(--muted);max-width:500px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(61,116,244,0.25);border-radius:2px}

<div id="app" style="grid-template-rows:52px 1fr 28px">

      </div>
    </div>
  </div>

</div>

// ============ UTILITIES ============
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function genId(pre) { return pre + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function fmtPrice(v) { return v != null ? '$' + Number(v).toFixed(2) : '—'; }
function fmtTime(iso) { return new Date(iso).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function completeness(p) {
  const fields = ['name','description','price','brand','category','weight','material','ean'];
  return Math.round(fields.filter(f => p[f] && String(p[f]).trim()).length / fields.length * 100);
}

function qClass(s) { return s >= 75 ? 'q-high' : s >= 50 ? 'q-med' : 'q-low'; }

function catName(catId) { const c = DB.categories.find(c => c.id === catId); return c ? c.name : 'Uncategorized'; }
function catChildren(parentId) { return DB.categories.filter(c => c.parent === parentId); }
function catDescendants(catId) {
  let ids = [catId];
  catChildren(catId).forEach(c => ids.push(...catDescendants(c.id)));
  return ids;
}
function productsInCat(catId) { const ids = catDescendants(catId); return DB.products.filter(p => ids.includes(p.category)); }
function labelObj(id) { return DB.labels.find(l => l.id === id); }
function labelByName(name) { return DB.labels.find(l => l.name.toLowerCase() === name.toLowerCase()); }

function getRelationships(productId) {
  return DB.relationships.filter(r => r.from === productId).map(r => ({
    ...r, product: DB.products.find(p => p.id === r.to)
  })).filter(r => r.product);
}

function addHistory(productId, action, detail) {
  if (!DB.history[productId]) DB.history[productId] = [];
  DB.history[productId].push({ time: new Date().toISOString(), user: 'You', action, detail });
}

function showToast(msg, duration=3000) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, duration);
}

      'cat-camping': `${product.brand} outdoor gear engineered for reliability in any conditions. Lightweight yet durable for serious adventurers.`,
    };
    suggestions.description = descs[product.category] || `Quality product from ${product.brand} designed to meet the highest standards of performance and durability.`;

// Duplicate detection
function findDuplicates(product) {
  return DB.products.filter(p => {
    if (p.id === product.id) return false;
    const nameSim = p.name.toLowerCase().split(' ').filter(w => product.name.toLowerCase().includes(w)).length;
    const nameWords = Math.max(p.name.split(' ').length, product.name.split(' ').length);
    return (nameSim / nameWords > 0.5) || (p.brand === product.brand && p.category === product.category && Math.abs(p.price - product.price) < product.price * 0.15);
  });
}

function labelHtml(labelId, removable, productId) {
  const l = labelObj(labelId); if (!l) return '';
  const bg = l.color + '20', c = l.color;
  let h = `<span class="label-tag" style="background:${bg};color:${c}">${esc(l.name)}`;
  if (removable) h += `<span class="remove-label" onclick="event.stopPropagation();removeLabelPrompt('${productId}','${labelId}')">&times;</span>`;
  return h + '</span>';
}

// ============ COMMAND PARSER ============
function parseCommand(input) {
  const n = input.trim().toLowerCase();
  const raw = input.trim();

  // ============ CONVERSATIONAL / FOLLOW-UP HANDLERS ============

  // Confirmations for pending actions
  if (convo.pendingConfirm && /^(yes|yeah|yep|sure|ok|okay|do it|go ahead|confirm|proceed|absolutely|please|yea|ja|aye)/i.test(n)) {
    return { type:'confirm_pending', raw };
  }
  if (convo.pendingConfirm && /^(no|nah|nope|cancel|never\s*mind|forget\s*it|don't|stop|abort)/i.test(n)) {
    return { type:'cancel_pending', raw };
  }

  // Numbered or positional choice for disambiguation
  if (convo.pendingChoice && /^(\d+|first|second|third|fourth|fifth|last|the\s*(first|second|third|last)\s*one)/i.test(n)) {
    const idx = parseChoiceIndex(n);
    return { type:'resolve_choice', index: idx, raw };
  }
  // "that one" / "this one" when a single product was last mentioned
  if (/^(that\s*one|this\s*one|the\s*one|it)\s*$/i.test(n) && convo.lastProduct) {
    return { type:'detail', query: convo.lastProduct.sku, raw };
  }

  // Follow-up references: "what about shoes?", "and electronics?", "how about Nike?"
  let followup = n.match(/^(what\s*about|how\s*about|and\s*|also\s*|now\s*show\s*|now\s*)(the\s*)?(.+?)\??$/i);
  if (followup && convo.lastAction) {
    const ref = followup[3].trim();
    // Re-run last action type with new target
    if (['show_category','show_label','filter_status','search'].includes(convo.lastAction)) {
      return reinterpretFollowup(ref, raw);
    }
  }

  // "Tell me more" / "more details" / "expand" — show detail on last product
  if (/^(tell\s*me\s*more|more\s*(details?|info)|expand|elaborate|details?)\s*$/i.test(n) && convo.lastProduct) {
    return { type:'detail', query: convo.lastProduct.sku, raw };
  }

  // "Edit it" / "edit that" / "change it" with implicit product
  if (/^(edit|update|change|modify)\s*(it|that|this|them)?\s*$/i.test(n) && convo.lastProduct) {
    return { type:'edit', query: convo.lastProduct.sku, raw };
  }

  // "Delete it" with implicit product
  if (/^(delete|remove)\s*(it|that|this)\s*$/i.test(n) && convo.lastProduct) {
    return { type:'delete', query: convo.lastProduct.sku, raw };
  }

  // "Enrich it" with implicit product
  if (/^(enrich|improve|suggest)\s*(it|that|this)?\s*$/i.test(n) && convo.lastProduct) {
    return { type:'enrich', target: convo.lastProduct.sku, raw };
  }

  // "Publish it" with implicit product
  if (/^(publish|activate)\s*(it|that|this)?\s*$/i.test(n) && convo.lastProduct) {
    return { type:'publish', target: convo.lastProduct.sku, raw };
  }

  // Emotional / conversational responses
  if (/^(this is (great|awesome|cool|nice|amazing)|love it|brilliant|perfect|wow|neat|impressive)/i.test(n)) return { type:'positive_feedback', raw };
  if (/^(this (sucks|is broken|doesn't work|is wrong)|ugh|damn|wtf|what the|broken|bug)/i.test(n)) return { type:'negative_feedback', raw };
  if (/^(i'?m?\s*(confused|lost|stuck)|i\s*don'?t\s*(understand|get|know)|what\s*(now|next|should i do))/i.test(n)) return { type:'confused', raw };
  if (/^(what\s*happened|what\s*did\s*(you|that)\s*do|what\s*changed|undo|go\s*back)/i.test(n)) return { type:'what_happened', raw };

  // ============ STANDARD COMMANDS ============

  // Greetings — expanded
  if (/^(hey|hi|hello|hei|yo|sup|good\s*(morning|afternoon|evening)|what'?s?\s*up|howdy|hiya|g'?day|greetings)/i.test(n)) return { type:'greeting', raw };
  if (/^(thanks?|thank\s*you|thx|cheers|ta|much\s*appreciated|tyvm)/i.test(n)) return { type:'thanks', raw };
  if (/^(help|what can you do|\?|capabilities|features|commands?|help\s*me\s*(get\s*started)?)/i.test(n)) return { type:'help', raw };
  if (/^(bye|goodbye|see\s*you|cya|later|gotta\s*go|signing\s*off)/i.test(n)) return { type:'goodbye', raw };

  // Natural questions about the catalog
  if (/^(how\s*many|count|total)\s*(products?|items?)/i.test(n)) return { type:'overview', raw };
  if (/^(what('?s| is| are)\s*(the|my|our)\s*(best|worst|top|lowest)\s*(quality|rated|scoring|complete))/i.test(n)) return { type:'quality', raw };
  if (/^(any|are there)\s*(incomplete|missing|empty|draft|problems?|issues?)/i.test(n)) return { type:'quality', raw };
  if (/^(what\s*(do i|should i|can i)\s*(do|work on|fix|improve)\s*(next|first|now)?)/i.test(n)) return { type:'suggest_next', raw };
  if (/^(show\s*me\s*everything|everything|all|give\s*me\s*everything)/i.test(n)) return { type:'show_all', raw };
  if (/^(how'?s?\s*(my|the|our)?\s*(data\s*)?quality)/i.test(n)) return { type:'quality', raw };

  // ============ SMART NATURAL LANGUAGE QUERIES ============
  // These catch rich attribute/property queries before simpler patterns

  // Smart query: detect compound queries like "find all white products", "show published shoes", etc.
  const smartResult = parseSmartQuery(n, raw);
  if (smartResult) return smartResult;

  // Show by category (must come before show_all to avoid false match)
  let cm = n.match(/^(show|list|find|get|browse|see)\s*(me\s*)?(all\s*)?(the\s*)?(products?\s*)?(in|from|under|for)\s+(.+)/i);
  if (cm) return { type:'show_category', category: cm[7].trim(), raw };

  // Show by label
  let lm = n.match(/^(show|list|find|get)\s*(me\s*)?(all\s*)?(products?\s*)?(with|labeled?|tagged?)\s+['"]?(.+?)['"]?\s*$/i);
  if (lm) return { type:'show_label', label: lm[6].trim(), raw };

  // Filter by status
  if (/^(show|list|find|get)\s*(me\s*)?(all\s*)?(the\s*)?(draft|active|archived)\s*(products?|ones?)?/i.test(n)) {
    const st = n.match(/(draft|active|archived)/i)[1];
    return { type:'filter_status', status: st, raw };
  }

  // Show / list all products
  if (/^(show|list|display|get|find|see|browse)\s*(me\s*)?(all\s*)?(the\s*)?(products?|items?|catalog|everything|inventory)/i.test(n)) return { type:'show_all', raw };

  // Duplicates (must come before search)
  if (/^(find\s*)?duplicates?$|^duplicate\s*(check|scan|detection)|any\s*duplicates?/i.test(n)) return { type:'duplicates', raw };

  // Export (before search)
  if (/^export\s*(all|csv|catalog|products?)?$/i.test(n)) return { type:'export', raw };

  // Compare
  let cpm2 = n.match(/^compare\s+(.+?)\s+(and|vs|with|,|to)\s+(.+)/i);
  if (cpm2) return { type:'compare', a: cpm2[1].trim(), b: cpm2[3].trim(), raw };

  // Search
  if (/^(search|find|look\s*for|where\s*is|locate)\s+/i.test(n)) {
    const q = n.replace(/^(search|find|look\s*for|where\s*is|locate)\s+/i, '').replace(/^(for\s+)?/i, '');
    return { type:'search', query: q, raw };
  }

  // Product detail
  let dm = n.match(/^(show|view|open|details?|info|tell\s*me\s*about|what\s*is|describe)\s+(for\s+|about\s+)?(.+)/i);
  if (dm) return { type:'detail', query: dm[3].trim(), raw };

  // Data quality
  if (/data\s*quality|completeness|quality\s*(report|score|overview)?|how.*(complete|good|clean)/i.test(n)) return { type:'quality', raw };

  // Status overview
  if (/^(status|overview|dashboard|summary|how.*(catalog|data|products?|things|doing|going))/i.test(n)) return { type:'overview', raw };

  // Add label — more natural patterns
  let alm = n.match(/^(add|assign|tag|apply|put)\s+(the\s+)?label\s+['"](.+?)['"]\s+(to|on)\s+(.+)/i);
  if (!alm) alm = n.match(/^label\s+(.+?)\s+(?:as|with)\s+['"](.+?)['"]/i);
  if (!alm) alm = n.match(/^tag\s+(.+?)\s+(?:as|with)\s+['"](.+?)['"]/i);
  if (alm) {
    const labelName = alm[3] || alm[2]; const target = alm[5] || alm[3] || alm[1];
    return { type:'add_label', label: labelName, target: target.trim(), raw };
  }

  // Remove label
  let rlm = n.match(/^remove\s+(the\s+)?label\s+['"](.+?)['"]\s+from\s+(.+)/i);
  if (rlm) return { type:'remove_label', label: rlm[2], target: rlm[3].trim(), raw };

  // Create label
  let clm = n.match(/^create\s+(a\s+)?(new\s+)?label\s+['"](.+?)['"](\s+(.+))?/i);
  if (clm) return { type:'create_label', name: clm[3], color: clm[5] || null, raw };

  // Edit / update product
  let em = n.match(/^(edit|update|change|set|modify|fix)\s+(the\s+)?(.+)/i);
  if (em) return { type:'edit', query: em[3].trim(), raw };

  // Bulk operations
  if (/^(select|bulk)\s+/i.test(n)) return { type:'bulk_select', query: n.replace(/^(select|bulk)\s+/i,''), raw };

  // Increase/decrease price — more patterns
  let pm = n.match(/(increase|decrease|raise|lower|reduce|bump|drop)\s+(the\s+)?price\s*(of|for|on)?\s*(.*?)\s*by\s+(\d+)\s*%/i);
  if (pm) return { type:'price_change', direction: pm[1], target: pm[4], percent: parseInt(pm[5]), raw };
  // "make shoes 10% more expensive"
  let pm2 = n.match(/make\s+(.+?)\s+(\d+)%\s*(more\s*expensive|cheaper)/i);
  if (pm2) return { type:'price_change', direction: pm2[3].includes('cheaper') ? 'decrease' : 'increase', target: pm2[1], percent: parseInt(pm2[2]), raw };

  // Delete
  let delm = n.match(/^(delete|remove|get\s*rid\s*of|trash)\s+(the\s+)?(product\s+)?(.+)/i);
  if (delm) return { type:'delete', query: delm[4].trim(), raw };

  // Import data
  if (/^(import|upload|load|onboard|ingest)\s*(data|products?|catalog|file|csv|excel|xlsx|spreadsheet)?/i.test(n)) return { type:'import', raw };
  if (/^(i have|i.?ve got|here.?s|got)\s*(a\s*)?(file|csv|excel|spreadsheet|data)/i.test(n)) return { type:'import', raw };
  if (/^(download|get|give me)\s*(a\s*)?(sample|example|template)\s*(file|csv|excel|spreadsheet)?/i.test(n)) return { type:'download_template', raw };

  // Create product
  if (/^(create|add|new|make)\s+(a\s+)?(new\s+)?(product|item)/i.test(n)) return { type:'create_product', raw };

  // Export target
  let exm = n.match(/^export\s+(.*)/i);
  if (exm) return { type:'export_target', target: exm[1], raw };

  // Enrich
  let enm = n.match(/^(enrich|suggest|improve|ai\s*enrich|optimize)\s+(.*)/i);
  if (enm) return { type:'enrich', target: enm[2].trim(), raw };
  if (/^enrich\s*all/i.test(n)) return { type:'enrich_all', raw };

  // Publish / unpublish
  let pubm = n.match(/^(publish|activate|go\s*live|make\s*active)\s+(.*)/i);
  if (pubm) return { type:'publish', target: pubm[2].trim(), raw };
  let unpubm = n.match(/^(unpublish|deactivate|archive|retire)\s+(.*)/i);
  if (unpubm) return { type:'unpublish', target: unpubm[2].trim(), raw };

  // History
  let hm = n.match(/^(history|changelog|changes|log|audit)\s*(for|of)?\s*(.*)/i);
  if (hm && hm[3]) return { type:'history', target: hm[3].trim(), raw };

  // Relationships
  let relm = n.match(/^(related|relationships?|cross.?sell|upsell|accessories)\s*(for|of|to)?\s*(.*)/i);
  if (relm && relm[3]) return { type:'relationships', target: relm[3].trim(), raw };

  // Add relationship
  let arm = n.match(/^(add|create)\s+(related|cross.?sell|upsell|accessory)\s+(.+?)\s+to\s+(.+)/i);
  if (arm) return { type:'add_relationship', relType: arm[2].replace(/\s/g,'-'), from: arm[4].trim(), to: arm[3].trim(), raw };

  // Move to category
  let movm = n.match(/^move\s+(.+?)\s+to\s+(category\s+)?(.+)/i);
  if (movm) return { type:'move_category', target: movm[1].trim(), category: movm[3].trim(), raw };

  // Clone / duplicate
  let clnm = n.match(/^(clone|copy|duplicate)\s+(product\s+)?(.+)/i);
  if (clnm) return { type:'clone', target: clnm[3].trim(), raw };

  // ============ SMART FALLBACK ============
  // Try to detect intent from natural phrasing before falling back to search
  return smartFallback(n, raw);
}

// ============ CONVERSATIONAL HELPERS ============

function parseChoiceIndex(text) {
  const words = { first:0, second:1, third:2, fourth:3, fifth:4, last:-1 };
  for (const [word, idx] of Object.entries(words)) {
    if (text.includes(word)) return idx;
  }
  const num = parseInt(text.match(/\d+/)?.[0]);
  return num ? num - 1 : 0;
}

function reinterpretFollowup(ref, raw) {
  // Try as category
  const cat = DB.categories.find(c => c.name.toLowerCase().includes(ref));
  if (cat) return { type:'show_category', category: ref, raw };
  // Try as label
  const lbl = DB.labels.find(l => l.name.toLowerCase().includes(ref));
  if (lbl) return { type:'show_label', label: ref, raw };
  // Try as status
  if (['active','draft','archived'].includes(ref)) return { type:'filter_status', status: ref, raw };
  // Fall back to search
  return { type:'search', query: ref, raw };
}

function smartFallback(n, raw) {
  // Check if input matches a category name
  const cat = DB.categories.find(c => c.name.toLowerCase() === n || c.name.toLowerCase().includes(n));
  if (cat) return { type:'show_category', category: n, raw };

  // Check if input matches a label name
  const lbl = DB.labels.find(l => l.name.toLowerCase() === n || l.name.toLowerCase().includes(n));
  if (lbl) return { type:'show_label', label: n, raw };

  // Check if input matches a brand
  const brand = DB.products.find(p => p.brand.toLowerCase() === n);
  if (brand) return { type:'search', query: n, raw };

  // Check if input looks like a SKU
  if (/^[A-Z]{2,}-\d{3}/i.test(n)) return { type:'detail', query: n, raw };

  // Check if input is a product name (fuzzy)
  const exactProduct = DB.products.find(p => p.name.toLowerCase().includes(n));
  if (exactProduct && n.length > 3) return { type:'detail', query: n, raw };

  // Check for question patterns
  if (/\?$/.test(n)) {
    if (/how\s*much|price|cost/i.test(n)) return { type:'search', query: n.replace(/[?]/g,'').trim(), raw };
    if (/where|which\s*category/i.test(n)) return { type:'search', query: n.replace(/[?]/g,'').trim(), raw };
  }

  // Ultimate fallback: search, but with a friendly message
  return { type:'fuzzy_search', query: n, raw };
}

// ============ SMART NATURAL LANGUAGE QUERY ENGINE ============

function parseSmartQuery(n, raw) {
  // Only trigger if there's a verb that indicates searching/filtering
  if (!/^(show|find|list|get|give|display|search|browse|see|which|what|are there|do we have|how many|count)/i.test(n)) return null;

  const filters = [];
  let remaining = n;

  // Strip leading verbs and filler words
  remaining = remaining.replace(/^(show|find|list|get|give|display|search|browse|see)\s*(me\s*)?(all\s*)?(the\s*)?(products?|items?)?\s*(that\s*(are|have|were|with))?\s*/i, '');
  remaining = remaining.replace(/^(which|what)\s*(products?|items?)?\s*(are|have|were|with)?\s*/i, '');
  remaining = remaining.replace(/^(are there|do we have|how many)\s*(products?|items?)?\s*(that\s*(are|have|were|with))?\s*/i, '');
  remaining = remaining.replace(/^(count)\s*(all\s*)?(the\s*)?(products?|items?)?\s*(that\s*(are|have|were|with))?\s*/i, '');

  if (!remaining.trim()) return null;

  // ---- Status filters ----
  const statusMap = {
    'published': 'active', 'live': 'active', 'active': 'active', 'online': 'active', 'enabled': 'active',
    'draft': 'draft', 'drafts': 'draft', 'unpublished': 'draft', 'not published': 'draft', 'pending': 'draft',
    'archived': 'archived', 'disabled': 'archived', 'inactive': 'archived', 'retired': 'archived', 'discontinued': 'archived'
  };
  for (const [word, status] of Object.entries(statusMap)) {
    const re = new RegExp(`\\b${word.replace(/\s/g,'\\s+')}\\b`, 'i');
    if (re.test(remaining)) {
      filters.push({ type: 'status', value: status, display: word });
      remaining = remaining.replace(re, ' ');
    }
  }

  // ---- Missing field filters (must come before quality to avoid "missing" triggering low quality) ----
  const missingFieldMatch = remaining.match(/\b(without|missing|no|empty|blank|lacking)\s+(a\s+)?(description|price|brand|sku|ean|barcode|weight|material|color|colour|image|name)/i);
  if (missingFieldMatch) {
    const field = missingFieldMatch[3].toLowerCase().replace('colour','color');
    filters.push({ type: 'missing_field', field: field, display: `missing ${field}` });
    remaining = remaining.replace(missingFieldMatch[0], ' ');
  }

  // ---- Quality filters ----
  // "missing/incomplete" only trigger quality when followed by quality/data/completeness
  if (/\b(low|poor|bad)\s*(quality|data|completeness|score)?\b/i.test(remaining) || /\b(incomplete|missing)\s+(quality|data|completeness|score)\b/i.test(remaining)) {
    filters.push({ type: 'quality', op: 'lt', value: 50, display: 'low quality (<50%)' });
    remaining = remaining.replace(/\b(low|poor|bad)\s*(quality|data|completeness|score)?\b/i, ' ');
    remaining = remaining.replace(/\b(incomplete|missing)\s+(quality|data|completeness|score)\b/i, ' ');
  }
  if (/\b(high|good|great|excellent|complete)\s*(quality|data|completeness|score)?\b/i.test(remaining)) {
    filters.push({ type: 'quality', op: 'gt', value: 75, display: 'high quality (>75%)' });
    remaining = remaining.replace(/\b(high|good|great|excellent|complete)\s*(quality|data|completeness|score)?\b/i, ' ');
  }
  if (/\b(medium|moderate|okay|ok|average)\s*(quality|data|completeness|score)?\b/i.test(remaining)) {
    filters.push({ type: 'quality', op: 'between', low: 50, high: 75, display: 'medium quality (50-75%)' });
    remaining = remaining.replace(/\b(medium|moderate|okay|ok|average)\s*(quality|data|completeness|score)?\b/i, ' ');
  }

  // ---- Price filters ----
  const priceAbove = remaining.match(/\b(over|above|more\s*than|exceeding|pricier\s*than|expensive)\s*\$?(\d+(?:\.\d+)?)\b/i);
  if (priceAbove) {
    filters.push({ type: 'price', op: 'gt', value: parseFloat(priceAbove[2]), display: `price > $${priceAbove[2]}` });
    remaining = remaining.replace(priceAbove[0], ' ');
  }
  const priceBelow = remaining.match(/\b(under|below|less\s*than|cheaper\s*than|up\s*to)\s*\$?(\d+(?:\.\d+)?)\b/i);
  if (priceBelow) {
    filters.push({ type: 'price', op: 'lt', value: parseFloat(priceBelow[2]), display: `price < $${priceBelow[2]}` });
    remaining = remaining.replace(priceBelow[0], ' ');
  }
  const priceBetween = remaining.match(/\bbetween\s*\$?(\d+(?:\.\d+)?)\s*(and|to|-)\s*\$?(\d+(?:\.\d+)?)\b/i);
  if (priceBetween) {
    filters.push({ type: 'price', op: 'between', low: parseFloat(priceBetween[1]), high: parseFloat(priceBetween[3]), display: `$${priceBetween[1]}-$${priceBetween[3]}` });
    remaining = remaining.replace(priceBetween[0], ' ');
  }
  // "expensive" / "cheap" standalone
  if (/\b(expensive|premium\s*priced|high.?priced|pricey)\b/i.test(remaining) && !filters.some(f => f.type === 'price')) {
    const prices = DB.products.map(p => p.price).sort((a,b) => b-a);
    const threshold = prices[Math.floor(prices.length * 0.25)] || 200;
    filters.push({ type: 'price', op: 'gt', value: threshold, display: `expensive (>$${threshold.toFixed(0)})` });
    remaining = remaining.replace(/\b(expensive|premium\s*priced|high.?priced|pricey)\b/i, ' ');
  }
  if (/\b(cheap|affordable|budget|low.?priced|bargain)\b/i.test(remaining) && !filters.some(f => f.type === 'price')) {
    const prices = DB.products.map(p => p.price).sort((a,b) => a-b);
    const threshold = prices[Math.floor(prices.length * 0.25)] || 100;
    filters.push({ type: 'price', op: 'lt', value: threshold, display: `affordable (<$${threshold.toFixed(0)})` });
    remaining = remaining.replace(/\b(cheap|affordable|budget|low.?priced|bargain)\b/i, ' ');
  }

  // ---- Category filters ----
  for (const cat of DB.categories) {
    const catName = cat.name.toLowerCase();
    const catRe = new RegExp(`\\b${catName.replace(/[&]/g,'.')}\\b`, 'i');
    if (catRe.test(remaining)) {
      filters.push({ type: 'category', id: cat.id, display: cat.name });
      remaining = remaining.replace(catRe, ' ');
      break; // one category at a time
    }
  }
  // Also check singular/plural variants
  const catSingularPlural = {
    'shoe': 'cat-shoes', 'shoes': 'cat-shoes', 'jacket': 'cat-jackets', 'jackets': 'cat-jackets',
    'shirt': 'cat-shirts', 'shirts': 'cat-shirts', 'phone': 'cat-phones', 'phones': 'cat-phones',
    'smartphone': 'cat-phones', 'smartphones': 'cat-phones', 'laptop': 'cat-laptops', 'laptops': 'cat-laptops',
    'headphone': 'cat-audio', 'headphones': 'cat-audio', 'speaker': 'cat-audio', 'speakers': 'cat-audio',
    'watch': 'cat-wear', 'watches': 'cat-wear', 'wearable': 'cat-wear', 'wearables': 'cat-wear',
    'tent': 'cat-camping', 'tents': 'cat-camping', 'lamp': 'cat-lighting', 'lamps': 'cat-lighting',
    'light': 'cat-lighting', 'lights': 'cat-lighting', 'chair': 'cat-furniture', 'chairs': 'cat-furniture',
    'furniture': 'cat-furniture', 'shelf': 'cat-furniture', 'shelves': 'cat-furniture',
    'sport': 'cat-sports', 'sports': 'cat-sports', 'outdoor': 'cat-sports', 'fitness': 'cat-fitness',
    'gym': 'cat-fitness', 'exercise': 'cat-fitness', 'camping': 'cat-camping'
  };
  if (!filters.some(f => f.type === 'category')) {
    for (const [word, catId] of Object.entries(catSingularPlural)) {
      const re = new RegExp(`\\b${word}\\b`, 'i');
      if (re.test(remaining)) {
        const cat = DB.categories.find(c => c.id === catId);
        if (cat) {
          filters.push({ type: 'category', id: catId, display: cat.name });
          remaining = remaining.replace(re, ' ');
          break;
        }
      }
    }
  }

  // ---- Label filters ----
  for (const lbl of DB.labels) {
    const lblName = lbl.name.toLowerCase();
    if (remaining.toLowerCase().includes(lblName)) {
      filters.push({ type: 'label', id: lbl.id, display: lbl.name });
      remaining = remaining.replace(new RegExp(lblName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'), ' ');
      break;
    }
  }
  // Also match "labeled as X", "tagged X"
  const lblMatch = remaining.match(/\b(labeled?|tagged?)\s*(?:as\s*)?['"]?(.+?)['"]?\s*$/i);
  if (lblMatch && !filters.some(f => f.type === 'label')) {
    const lbl = DB.labels.find(l => l.name.toLowerCase().includes(lblMatch[2].trim().toLowerCase()));
    if (lbl) {
      filters.push({ type: 'label', id: lbl.id, display: lbl.name });
      remaining = remaining.replace(lblMatch[0], ' ');
    }
  }

  // ---- Brand filters ----
  const brands = [...new Set(DB.products.map(p => p.brand).filter(Boolean))];
  for (const brand of brands) {
    const brandRe = new RegExp(`\\b${brand.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i');
    if (brandRe.test(remaining)) {
      filters.push({ type: 'brand', value: brand, display: brand });
      remaining = remaining.replace(brandRe, ' ');
      break;
    }
  }

  // ---- Attribute/property text filters (color, material, etc.) ----
  // Clean remaining text of filler words
  let attrText = remaining.replace(/\b(and|or|with|that|are|is|in|the|a|an|all|products?|items?|which|have|has)\b/gi, ' ').trim();
  // Split into potential attribute terms
  const attrTerms = attrText.split(/\s+/).filter(t => t.length > 1);

  // Known color words
  const COLORS = ['red','blue','green','black','white','yellow','orange','pink','purple','brown','grey','gray','silver','gold','beige','navy','teal','maroon','cream','ivory','charcoal','tan','olive','coral','turquoise','indigo','magenta','cyan','burgundy','lavender','mint','peach','rose','bronze','copper','slate','stone','stonewash','denim'];
  // Known materials
  const MATERIALS = ['leather','cotton','wool','silk','polyester','nylon','aluminum','aluminium','steel','wood','bamboo','rubber','plastic','canvas','suede','mesh','foam','carbon','titanium','ceramic','glass','linen','denim','gore-tex','goretex','fleece','down','synthetic','organic'];

  for (const term of attrTerms) {
    const tLow = term.toLowerCase();
    if (COLORS.includes(tLow)) {
      filters.push({ type: 'attribute', field: 'color', value: tLow, display: `${tLow} colored` });
    } else if (MATERIALS.includes(tLow)) {
      filters.push({ type: 'attribute', field: 'material', value: tLow, display: `${tLow} material` });
    } else if (tLow.length > 2 && !['show','find','list','get','all','the','and','for','not','how','with'].includes(tLow)) {
      // Generic text search on all fields
      filters.push({ type: 'text', value: tLow, display: `"${tLow}"` });
    }
  }

  // Only return a smart query if we found meaningful filters
  if (filters.length === 0) return null;

  // Check if this is a count query
  const isCount = /^(how many|count)/i.test(n);

  return { type: 'smart_query', filters, isCount, raw };
}

function executeSmartFilter(filters) {
  let products = [...DB.products];

  for (const f of filters) {
    switch (f.type) {
      case 'status':
        products = products.filter(p => p.status === f.value);
        break;
      case 'quality':
        if (f.op === 'lt') products = products.filter(p => completeness(p) < f.value);
        else if (f.op === 'gt') products = products.filter(p => completeness(p) > f.value);
        else if (f.op === 'between') products = products.filter(p => { const c = completeness(p); return c >= f.low && c <= f.high; });
        break;
      case 'missing_field':
        products = products.filter(p => !p[f.field] || String(p[f.field]).trim() === '');
        break;
      case 'price':
        if (f.op === 'gt') products = products.filter(p => p.price > f.value);
        else if (f.op === 'lt') products = products.filter(p => p.price < f.value);
        else if (f.op === 'between') products = products.filter(p => p.price >= f.low && p.price <= f.high);
        break;
      case 'category':
        const catIds = getAllDescendantCatIds(f.id);
        catIds.push(f.id);
        products = products.filter(p => catIds.includes(p.category));
        break;
      case 'label':
        products = products.filter(p => p.labels && p.labels.includes(f.id));
        break;
      case 'brand':
        products = products.filter(p => p.brand && p.brand.toLowerCase() === f.value.toLowerCase());
        break;
      case 'attribute':
        products = products.filter(p => {
          const val = (p[f.field] || '').toLowerCase();
          return val.includes(f.value);
        });
        break;
      case 'text':
        products = products.filter(p =>
          p.name.toLowerCase().includes(f.value) ||
          (p.description || '').toLowerCase().includes(f.value) ||
          (p.brand || '').toLowerCase().includes(f.value) ||
          (p.material || '').toLowerCase().includes(f.value) ||
          (p.color || '').toLowerCase().includes(f.value) ||
          p.sku.toLowerCase().includes(f.value)
        );
        break;
    }
  }
  return products;
}

function getAllDescendantCatIds(parentId) {
  const children = DB.categories.filter(c => c.parent === parentId);
  let ids = children.map(c => c.id);
  for (const child of children) ids = ids.concat(getAllDescendantCatIds(child.id));
  return ids;
}

function execSmartQuery(filters, isCount, raw) {
  const products = executeSmartFilter(filters);
  convo.lastProducts = products;

  // Build a natural language description of what was searched
  const filterDescriptions = filters.map(f => `<span style="display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:100px;background:rgba(61,116,244,0.12);color:#8BAAFF;margin:1px 2px">${esc(f.display)}</span>`).join(' ');

  if (isCount) {
    // Count query — answer directly
    addSystem(
      `<p><strong style="font-size:22px;color:var(--blue)">${products.length}</strong> product${products.length !== 1 ? 's' : ''} match${products.length === 1 ? 'es' : ''}:</p>
      <div style="margin:6px 0">${filterDescriptions}</div>
      ${products.length > 0 ? `<p style="font-size:12px;color:var(--muted);margin-top:6px">Say "show" to see them, or refine your query.</p>` : ''}`,
      products.length > 0
        ? [`Show ${products.length > 10 ? 'first 10' : 'them'}`, 'Show all products', 'Data quality report']
        : ['Show all products', 'Help']
    );
    return;
  }

  if (products.length === 0) {
    addSystem(
      `<p>${pick(["No products match those criteria:","I couldn't find any products matching:","Nothing found for:"])}</p>
      <div style="margin:8px 0">${filterDescriptions}</div>
      <p style="font-size:13px;color:var(--muted);margin-top:6px">${pick([
        "Try broadening your search — maybe drop one of the filters?",
        "Want to try a different combination?",
        "I searched across names, descriptions, colors, materials, and more."
      ])}</p>`,
      ['Show all products', 'Show draft products', 'Help']
    );
    return;
  }

  if (products.length === 1) {
    convo.lastProduct = products[0];
  }

  // Build smart commentary based on what was found
  let commentary = '';
  if (filters.some(f => f.type === 'quality' && f.op === 'lt')) {
    commentary = `<p style="font-size:12px;color:var(--yellow);margin-top:6px">💡 These products need enrichment. Say <strong>"enrich all"</strong> to get AI suggestions, or click any product to edit.</p>`;
  } else if (filters.some(f => f.type === 'status' && f.value === 'draft')) {
    commentary = `<p style="font-size:12px;color:var(--yellow);margin-top:6px">💡 Draft products aren't live yet. Say <strong>"publish all"</strong> to activate them, or review individually.</p>`;
  } else if (filters.some(f => f.type === 'missing_field')) {
    const field = filters.find(f => f.type === 'missing_field').field;
    commentary = `<p style="font-size:12px;color:var(--yellow);margin-top:6px">💡 These products are missing their ${field}. Want me to help fill them in?</p>`;
  }

  // Smart follow-up suggestions
  const suggestions = [];
  if (products.length > 1) suggestions.push(`Add label to these ${products.length} products`);
  if (filters.some(f => f.type === 'status' && f.value === 'draft') && products.length > 0) suggestions.push('Publish all drafts');
  if (filters.some(f => f.type === 'quality')) suggestions.push('Enrich all');
  if (filters.some(f => f.type === 'category')) {
    const catFilter = filters.find(f => f.type === 'category');
    const cat = DB.categories.find(c => c.id === catFilter.id);
    if (cat) suggestions.push(`Increase price of ${cat.name} by 5%`);
  }
  suggestions.push('Show all products');
  if (suggestions.length < 3) suggestions.push('Data quality report');

  addSystem(
    `<p>${pick([
      `Found <strong>${products.length}</strong> product${products.length !== 1 ? 's' : ''} matching:`,
      `<strong>${products.length}</strong> product${products.length !== 1 ? 's' : ''} match your query:`,
      `Here ${products.length === 1 ? 'is' : 'are'} <strong>${products.length}</strong> result${products.length !== 1 ? 's' : ''} for:`
    ])}</p>
    <div style="margin:6px 0">${filterDescriptions}</div>
    ${productTableHtml(products, `${products.length} Results`)}
    ${commentary}`,
    suggestions.slice(0, 4)
  );
}

// ============ FIND PRODUCTS ============
function findProducts(query) {
  const q = query.toLowerCase();
  // Try SKU first
  let found = DB.products.filter(p => p.sku.toLowerCase() === q);
  if (found.length) return found;
  // Try name exact
  found = DB.products.filter(p => p.name.toLowerCase() === q);
  if (found.length) return found;
  // Try partial match
  found = DB.products.filter(p =>
    p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) ||
    p.brand.toLowerCase().includes(q) || p.description.toLowerCase().includes(q)
  );
  return found;
}

function findByTarget(target) {
  const t = target.toLowerCase().trim();
  // "all shoes", "all electronics", category names
  const cleanT = t.replace(/^all\s+/,'');
  // Check category
  const cat = DB.categories.find(c => c.name.toLowerCase().includes(cleanT));
  if (cat) return productsInCat(cat.id);
  // Check label
  const lbl = DB.labels.find(l => l.name.toLowerCase().includes(cleanT));
  if (lbl) return DB.products.filter(p => p.labels.includes(lbl.id));
  // Check status
  if (['active','draft','archived'].includes(cleanT)) return DB.products.filter(p => p.status === cleanT);
  // Check brand
  let found = DB.products.filter(p => p.brand.toLowerCase().includes(cleanT));
  if (found.length) return found;
  // Fallback to search
  return findProducts(cleanT);
}

// ============ COMMAND EXECUTION ============
async function executeCommand(input) {
  addUser(input);
  convo.lastQuery = input;
  const cmd = parseCommand(input);

  // Vary typing delay for naturalness
  const thinkTime = ['greeting','thanks','positive_feedback','negative_feedback','goodbye'].includes(cmd.type)
    ? 200 + Math.random() * 300
    : 400 + Math.random() * 600;
  showTyping();
  await delay(thinkTime);
  hideTyping();

  // Track action for follow-ups
  convo.lastAction = cmd.type;

  switch (cmd.type) {
    // Conversational
    case 'confirm_pending': execConfirmPending(); break;
    case 'cancel_pending': execCancelPending(); break;
    case 'resolve_choice': execResolveChoice(cmd.index); break;
    case 'positive_feedback': execPositiveFeedback(); break;
    case 'negative_feedback': execNegativeFeedback(); break;
    case 'confused': execConfused(); break;
    case 'what_happened': execWhatHappened(); break;
    case 'goodbye': execGoodbye(); break;
    case 'suggest_next': execSuggestNext(); break;
    case 'fuzzy_search': execFuzzySearch(cmd.query); break;

    // Standard
    case 'greeting': execGreeting(); break;
    case 'thanks': execThanks(); break;
    case 'help': execHelp(); break;
    case 'smart_query': execSmartQuery(cmd.filters, cmd.isCount, cmd.raw); break;
    case 'show_all': execShowAll(); break;
    case 'filter_status': execFilterStatus(cmd.status); break;
    case 'show_category': execShowCategory(cmd.category); break;
    case 'show_label': execShowLabel(cmd.label); break;
    case 'search': execSearch(cmd.query); break;
    case 'detail': execDetail(cmd.query); break;
    case 'quality': execQuality(); break;
    case 'overview': execOverview(); break;
    case 'add_label': execAddLabel(cmd.label, cmd.target); break;
    case 'remove_label': execRemoveLabel(cmd.label, cmd.target); break;
    case 'create_label': execCreateLabel(cmd.name, cmd.color); break;
    case 'edit': execEdit(cmd.query); break;
    case 'price_change': execPriceChange(cmd.direction, cmd.target, cmd.percent); break;
    case 'bulk_select': execBulkSelect(cmd.query); break;
    case 'delete': execDelete(cmd.query); break;
    case 'import': execImport(); break;
    case 'download_template': execDownloadTemplate(); break;
    case 'create_product': execCreateProduct(); break;
    case 'export': execExport(); break;
    case 'export_target': execExportTarget(cmd.target); break;
    case 'compare': execCompare(cmd.a, cmd.b); break;
    case 'duplicates': execDuplicates(); break;
    case 'enrich': execEnrich(cmd.target); break;
    case 'enrich_all': execEnrichAll(); break;
    case 'publish': execPublish(cmd.target); break;
    case 'unpublish': execUnpublish(cmd.target); break;
    case 'history': execHistory(cmd.target); break;
    case 'relationships': execRelationships(cmd.target); break;
    case 'add_relationship': execAddRelationship(cmd.relType, cmd.from, cmd.to); break;
    case 'move_category': execMoveCategory(cmd.target, cmd.category); break;
    case 'clone': execClone(cmd.target); break;
    default: execFuzzySearch(cmd.query || cmd.raw);
  }
}

    addSystem(`<p>Hmm, I don't have anything pending to confirm. What would you like to do?</p>`, smartSuggestions());
    return;
  }
  const action = convo.pendingConfirm;

function execResolveChoice(index) {
  if (!convo.pendingChoice || !convo.pendingChoice.length) {
    addSystem(`<p>I don't have a list to pick from right now. Could you be more specific?</p>`, smartSuggestions());
    return;
  }
  const items = convo.pendingChoice;
  const idx = index === -1 ? items.length - 1 : Math.min(index, items.length - 1);
  const chosen = items[idx];
  convo.pendingChoice = null;
  if (chosen) {
    convo.lastProduct = chosen;
    execDetailForProduct(chosen);
  }
}

function execFuzzySearch(query) {
  const results = findProducts(query);
  if (results.length === 1) {
    convo.lastProduct = results[0];

    addSystem(
      `<p>${pick(["I think you're looking for this:","Found this — is this what you meant?","Here's what I found:"])}</p>${productCardHtml(results[0])}`,
      [`Edit ${results[0].sku}`, `Enrich ${results[0].sku}`, 'Show all products', `History for ${results[0].sku}`]
    );
  } else if (results.length > 1) {
    convo.lastProducts = results;
    convo.pendingChoice = results.slice(0, 10);
    addSystem(
      `<p>I found ${results.length} products that might match "<strong>${esc(query)}</strong>". ${pick(["Did you mean one of these?","Which one are you looking for?","Here's what came up:"])}</p>${productTableHtml(results)}`,
      results.slice(0, 3).map(p => `Show ${p.sku}`)
    );
  } else {
    // No results — be helpful
    addSystem(
      `<p>I couldn't find anything matching "<strong>${esc(query)}</strong>". ${pick([
        "Could you try rephrasing?",
        "Maybe check the spelling or try a different term?",

      ['Show all products', 'Help', 'Overview']
    );
  }
}

function smartSuggestions() {
  // Context-aware suggestions based on what's been happening
  const suggestions = [];
  if (convo.lastProduct) {
    suggestions.push(`Edit ${convo.lastProduct.sku}`, `Enrich ${convo.lastProduct.sku}`);
  }
  const drafts = DB.products.filter(p => p.status === 'draft');
  if (drafts.length) suggestions.push('Show draft products');
  if (!suggestions.length || suggestions.length < 3) {
    suggestions.push('Show all products', 'Data quality report', 'Overview');
  }
  return suggestions.slice(0, 4);
}

function execShowAll() {
  convo.lastProducts = DB.products;
  addSystem(
    `<p>${pick(["Here's your full catalog:","Here are all your products:","Showing everything — ${DB.products.length} products:"])}</p>${productTableHtml(DB.products, 'All Products')}

    ['Show draft products', 'Data quality report', 'What should I work on next?', 'Find duplicates']
  );
}

function execFilterStatus(status) {
  const products = DB.products.filter(p => p.status === status);
  convo.lastProducts = products;
  const commentary = status === 'draft'
    ? (products.length > 3 ? `That's quite a few drafts — want me to help enrich or publish some?` : `Not too many drafts. Looking good!`)
    : status === 'active'
    ? `These are live and ready to go.`
    : `These have been archived.`;
  addSystem(
    `<p>Found <strong>${products.length}</strong> ${status} product${products.length !== 1 ? 's' : ''}:</p>${productTableHtml(products)}
    <p style="margin-top:6px;font-size:13px;color:var(--muted)">${commentary}</p>`,
    status === 'draft'
      ? ['Enrich all', 'Show active products', 'What should I work on next?']
      : status === 'active'
      ? ['Show draft products', 'Export', 'Data quality report']
      : ['Show active products', 'Show draft products']
  );
}

function execShowCategory(category) {
  const cat = DB.categories.find(c => c.name.toLowerCase().includes(category.toLowerCase()));
  if (!cat) {
    addSystem(`<p>I couldn't find a category matching "<strong>${esc(category)}</strong>". Available categories:</p>
    <ul style="margin:8px 0 8px 16px;font-size:13px;color:var(--muted)">${DB.categories.map(c => `<li>${esc(c.name)}</li>`).join('')}</ul>`,
    ['Show products in Electronics', 'Show products in Shoes', 'Show products in Jackets']);
    return;
  }
  const products = productsInCat(cat.id);
  addSystem(
    `<p>Products in <strong>${esc(cat.name)}</strong>:</p>${productTableHtml(products, cat.name)}`,
    [`Add label to all ${cat.name}`, `Show all products`, `Increase price of ${cat.name} by 5%`]
  );
}

function execShowLabel(labelName) {
  const lbl = DB.labels.find(l => l.name.toLowerCase().includes(labelName.toLowerCase()));
  if (!lbl) {
    addSystem(`<p>No label matching "<strong>${esc(labelName)}</strong>". Available labels:</p>
    <div style="margin:8px 0">${DB.labels.map(l => labelHtml(l.id, false)).join(' ')}</div>`,
    DB.labels.slice(0,3).map(l => `Show products labeled "${l.name}"`));
    return;
  }
  const products = DB.products.filter(p => p.labels.includes(lbl.id));
  addSystem(
    `<p>Products with label ${labelHtml(lbl.id, false)}:</p>${productTableHtml(products)}`,

  );

function execSearch(query) {
  const results = findProducts(query);
  convo.lastProducts = results;
  if (results.length === 1) {
    convo.lastProduct = results[0];
    execDetailForProduct(results[0]);
    return;
  }
  if (results.length === 0) {
    addSystem(
      `<p>${pick(["Hmm, nothing came up for","No results for","I couldn't find anything matching"])} "<strong>${esc(query)}</strong>". ${pick(["Try a different term?","Want to browse by category instead?","Let me know if you want to try something else."])}</p>`,
      ['Show all products', 'Show products in Electronics', 'Show products in Shoes', 'Help']
    );
    return;
  }
  convo.pendingChoice = results.slice(0, 10);
  addSystem(
    `<p>${pick(["Here's what I found:","Found ${results.length} matches:","${results.length} products match your search:"])}</p>${productTableHtml(results, 'Search Results')}
    <p style="margin-top:6px;font-size:12px;color:var(--muted)">💡 Click a product for details, or say "the first one" to select.</p>`,
    results.slice(0, 3).map(p => `Show ${p.sku}`)
  );
}

function execDetail(query) {
  const q = query.toLowerCase().replace(/^(for|product|item)\s+/i, '');
  const product = DB.products.find(p => p.sku.toLowerCase() === q || p.name.toLowerCase().includes(q));
  if (!product) {
    const results = findProducts(q);
    if (results.length > 1) {
      convo.pendingChoice = results;
      convo.lastProducts = results;
      addSystem(`<p>${pick(["I found a few matches — which one?","Multiple products match. Which did you mean?","A few options here:"])}</p>${productTableHtml(results)}`,
        results.slice(0,3).map(p => `Show ${p.sku}`)
      );
    } else if (results.length === 1) {
      convo.lastProduct = results[0];
      execDetailForProduct(results[0]);
    } else {
      addSystem(`<p>Couldn't find "<strong>${esc(query)}</strong>". ${pick(["Check the SKU or name?","Want to search differently?","Maybe try browsing?"])}</p>`, ['Show all products']);
    }
    return;
  }
  convo.lastProduct = product;
  execDetailForProduct(product);
}

function execDetailForProduct(p) {
  const q = completeness(p);
  const lbls = p.labels.map(l => labelHtml(l, false)).join(' ') || '<span style="color:var(--muted)">None</span>';
  const missing = [];
  if (!p.description) missing.push('description');
  if (!p.weight) missing.push('weight');
  if (!p.material) missing.push('material');
  if (!p.ean) missing.push('EAN');

  let html = `
    <div class="product-card">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div><div class="product-card-name">${esc(p.name)}</div><div class="product-card-sku">${esc(p.sku)}</div></div>
        <span class="status-badge status-${p.status}">${p.status}</span>
      </div>
      <div class="product-card-grid">
        <div><span class="field-label">Brand</span><div>${esc(p.brand) || '—'}</div></div>
        <div><span class="field-label">Price</span><div>${fmtPrice(p.price)}</div></div>
        <div><span class="field-label">Category</span><div>${esc(catName(p.category))}</div></div>
        <div><span class="field-label">Weight</span><div>${esc(p.weight) || '—'}</div></div>
        <div><span class="field-label">Material</span><div>${esc(p.material) || '—'}</div></div>
        <div><span class="field-label">EAN</span><div>${esc(p.ean) || '—'}</div></div>
      </div>
      <div style="margin-top:10px"><span class="field-label">Labels</span><div style="margin-top:4px">${lbls}</div></div>
      <div style="margin-top:10px"><span class="field-label">Quality Score</span>
        <div class="quality-bar"><div class="quality-fill ${qClass(q)}" style="width:${q}%"></div></div>
        <span style="font-size:12px;color:var(--muted)">${q}% complete</span>
      </div>
      ${p.description ? `<div style="margin-top:10px"><span class="field-label">Description</span><div style="font-size:13px;color:var(--muted);margin-top:4px">${esc(p.description)}</div></div>` : ''}
    </div>`;

  if (missing.length) {
    html += `<p style="font-size:13px;color:var(--yellow);margin-top:4px">⚠ Missing fields: ${missing.join(', ')}</p>`;
  }

  addSystem(html, [`Edit ${p.sku}`, `Add label to ${p.sku}`, `Show products in ${catName(p.category)}`]);
}

function execQuality() {
  const products = DB.products;
  const scores = products.map(p => completeness(p));
  const avg = Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
  const high = scores.filter(s => s >= 75).length;
  const med = scores.filter(s => s >= 50 && s < 75).length;
  const low = scores.filter(s => s < 50).length;
  const incomplete = products.filter(p => !p.description).length;
  const noEan = products.filter(p => !p.ean).length;

  const worst = [...products].sort((a,b) => completeness(a) - completeness(b)).slice(0, 5);

  addSystem(
    `<p><strong>Data Quality Report</strong></p>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0">
      <div style="background:rgba(61,116,244,0.1);border:1px solid rgba(61,116,244,0.2);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--blue)">${avg}%</div><div style="font-size:10px;color:var(--muted)">Avg Score</div>
      </div>
      <div style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--green)">${high}</div><div style="font-size:10px;color:var(--muted)">High (75%+)</div>
      </div>
      <div style="background:rgba(251,231,77,0.1);border:1px solid rgba(251,231,77,0.2);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--yellow)">${med}</div><div style="font-size:10px;color:var(--muted)">Medium</div>
      </div>
      <div style="background:rgba(235,72,94,0.1);border:1px solid rgba(235,72,94,0.2);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--red)">${low}</div><div style="font-size:10px;color:var(--muted)">Low (&lt;50%)</div>
      </div>
    </div>
    <p style="font-size:13px"><strong>Key issues:</strong></p>
    <ul style="margin:6px 0 6px 16px;font-size:13px;color:var(--muted)">
      <li><strong>${incomplete}</strong> products missing descriptions</li>
      <li><strong>${noEan}</strong> products missing EAN codes</li>
    </ul>
    <p style="font-size:13px;margin-top:8px"><strong>Products needing attention:</strong></p>
    ${productTableHtml(worst, 'Lowest Quality')}`,
    ['Show draft products', 'Edit ' + worst[0]?.sku, 'Show all products']
  );
}

function execOverview() {
  const byStatus = { active: 0, draft: 0, archived: 0 };
  DB.products.forEach(p => byStatus[p.status] = (byStatus[p.status]||0) + 1);
  const topCats = DB.categories.filter(c => !c.parent).map(c => ({
    name: c.name, count: productsInCat(c.id).length
  })).sort((a,b) => b.count - a.count);

  addSystem(
    `<p><strong>Catalog Overview</strong></p>
    <p style="margin:8px 0;font-size:13px">Your catalog contains <strong>${DB.products.length}</strong> products across <strong>${DB.categories.length}</strong> categories.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0">
      <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:12px">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">By Status</div>
        <div style="font-size:13px"><span style="color:var(--green)">● Active:</span> <strong>${byStatus.active}</strong></div>
        <div style="font-size:13px"><span style="color:var(--yellow)">● Draft:</span> <strong>${byStatus.draft}</strong></div>
        <div style="font-size:13px"><span style="color:var(--muted)">● Archived:</span> <strong>${byStatus.archived || 0}</strong></div>
      </div>
      <div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:12px">
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Top Categories</div>
        ${topCats.map(c => `<div style="font-size:13px">${esc(c.name)}: <strong>${c.count}</strong></div>`).join('')}
      </div>
    </div>
    <p style="font-size:13px"><strong>Active labels:</strong></p>
    <div style="margin:6px 0">${DB.labels.map(l => {
      const cnt = DB.products.filter(p => p.labels.includes(l.id)).length;
      return labelHtml(l.id, false) + `<span style="font-size:11px;color:var(--muted);margin-right:8px">(${cnt})</span>`;
    }).join('')}</div>`,
    ['Show all products', 'Data quality report', 'Show draft products']
  );
