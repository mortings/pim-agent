function execAddLabel(labelName, target) {
  // Find or create label
  let lbl = DB.labels.find(l => l.name.toLowerCase() === labelName.toLowerCase());
  const products = findByTarget(target);
  if (!products.length) {
    addSystem(`<p>No products found matching "<strong>${esc(target)}</strong>".</p>`, ['Show all products']);
    return;
  }

  const previewId = 'chg_' + Date.now();
  const isNew = !lbl;
  const already = lbl ? products.filter(p => p.labels.includes(lbl.id)).length : 0;
  const toChange = lbl ? products.filter(p => !p.labels.includes(lbl.id)) : products;

  let html = `<div class="change-preview" id="${previewId}">
    <div class="change-preview-hdr">🏷️ ${isNew ? 'Create label & apply' : 'Apply label'} to ${toChange.length} product${toChange.length!==1?'s':''}</div>
    <div class="change-preview-body">
      ${isNew ? `<p style="font-size:13px;margin-bottom:8px">New label "<strong>${esc(labelName)}</strong>" will be created.</p>` : ''}
      ${already > 0 ? `<p style="font-size:12px;color:var(--muted);margin-bottom:6px">${already} product${already!==1?'s':''} already have this label and will be skipped.</p>` : ''}
      <p style="font-size:13px;font-weight:600;margin-bottom:4px">Products to be labeled:</p>
      <ul style="margin:4px 0 0 16px;font-size:12px;color:var(--muted)">${toChange.slice(0,8).map(p => `<li>${esc(p.name)} (${esc(p.sku)})</li>`).join('')}
      ${toChange.length > 8 ? `<li>...and ${toChange.length - 8} more</li>` : ''}</ul>
    </div>
    <div class="change-actions">
      <button class="btn btn-cancel" onclick="dismissChange('${previewId}')">Cancel</button>
      <button class="btn btn-confirm" onclick="confirmAddLabel('${previewId}','${esc(labelName)}','${target}')">Apply Label</button>
    </div>
  </div>`;
  addSystem(html, []);
}

window.confirmAddLabel = function(previewId, labelName, target) {
  let lbl = DB.labels.find(l => l.name.toLowerCase() === labelName.toLowerCase());
  if (!lbl) {
    const colors = ['#EC672B','#3D74F4','#34D399','#EB485E','#A78BFF','#FBE74D'];
    lbl = { id: genId('lbl'), name: labelName, color: pick(colors) };
    DB.labels.push(lbl);
  }
  const products = findByTarget(target);
  let count = 0;
  products.forEach(p => {
    if (!p.labels.includes(lbl.id)) { p.labels.push(lbl.id); p.updated = new Date().toISOString(); count++; }
  });
  const el = document.getElementById(previewId);
  if (el) el.outerHTML = `<div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);border-radius:var(--radius);padding:12px;margin:8px 0">
    <p style="color:var(--green);font-weight:700">✓ Label ${labelHtml(lbl.id, false)} applied to ${count} product${count!==1?'s':''}.</p></div>`;
  addAudit('label', `Added "${lbl.name}" to ${count} products`);
};

function execRemoveLabel(labelName, target) {
  const lbl = DB.labels.find(l => l.name.toLowerCase() === labelName.toLowerCase());
  if (!lbl) { addSystem(`<p>Label "<strong>${esc(labelName)}</strong>" not found.</p>`, []); return; }
  const products = findByTarget(target);
  const toChange = products.filter(p => p.labels.includes(lbl.id));
  if (!toChange.length) { addSystem(`<p>None of the matched products have label "${esc(labelName)}".</p>`, []); return; }

  const previewId = 'chg_' + Date.now();
  addSystem(`<div class="change-preview destructive" id="${previewId}">
    <div class="change-preview-hdr">🏷️ Remove label from ${toChange.length} product${toChange.length!==1?'s':''}</div>
    <div class="change-preview-body">
      <p style="font-size:13px">Label ${labelHtml(lbl.id,false)} will be removed from:</p>
      <ul style="margin:6px 0 0 16px;font-size:12px;color:var(--muted)">${toChange.map(p => `<li>${esc(p.name)} (${esc(p.sku)})</li>`).join('')}</ul>
    </div>
    <div class="change-actions">
      <button class="btn btn-cancel" onclick="dismissChange('${previewId}')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmRemoveLabel('${previewId}','${lbl.id}','${target}')">Remove Label</button>
    </div>
  </div>`, []);
}

window.confirmRemoveLabel = function(previewId, lblId, target) {
  const products = findByTarget(target);
  let count = 0;
  products.forEach(p => {
    if (p.labels.includes(lblId)) { p.labels = p.labels.filter(l => l !== lblId); p.updated = new Date().toISOString(); count++; }
  });
  const lbl = labelObj(lblId);
  const el = document.getElementById(previewId);
  if (el) el.outerHTML = `<div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);border-radius:var(--radius);padding:12px;margin:8px 0">
    <p style="color:var(--green);font-weight:700">✓ Label removed from ${count} product${count!==1?'s':''}.</p></div>`;
  addAudit('label', `Removed "${lbl?.name}" from ${count} products`);
};

function execCreateLabel(name, color) {
  if (DB.labels.find(l => l.name.toLowerCase() === name.toLowerCase())) {
    addSystem(`<p>Label "<strong>${esc(name)}</strong>" already exists.</p>`, [`Show products labeled "${name}"`]);
    return;
  }
  const colors = ['#EC672B','#3D74F4','#34D399','#EB485E','#A78BFF','#FBE74D'];
  const lbl = { id: genId('lbl'), name, color: color || pick(colors) };
  DB.labels.push(lbl);
  addAudit('create', `Created label "${name}"`);
  addSystem(
    `<p>Label ${labelHtml(lbl.id, false)} has been created.</p><p style="font-size:13px;color:var(--muted);margin-top:4px">You can now apply it to products.</p>`,
    [`Add label "${name}" to all products`, `Show all products`]
  );
}

      <div><label style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase">Brand</label><input id="edit-brand" value="${esc(product.brand)}" style="width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:13px;margin-top:4px"></div>
      <div><label style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase">Status</label>
        <select id="edit-status" style="width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--white);font-family:'Montserrat',sans-serif;font-size:13px;margin-top:4px">

window.saveEdit = function(productId) {
  const p = DB.products.find(x => x.id === productId);
  if (!p) return;
  const changes = [];
  const fields = {name:'edit-name',price:'edit-price',brand:'edit-brand',status:'edit-status',description:'edit-desc',weight:'edit-weight',material:'edit-material',ean:'edit-ean'};
  const newVals = {};
  for (const [key, elId] of Object.entries(fields)) {
    const val = document.getElementById(elId).value.trim();
    const newVal = key === 'price' ? parseFloat(val) : val;
    if (String(p[key]) !== String(newVal)) {
      changes.push({ field: key, from: p[key], to: newVal });
      newVals[key] = newVal;
    }
  }
  if (!changes.length) { closeModal(); addSystem('<p>No changes made.</p>', []); return; }
  closeModal();

  // Show diff preview
  const previewId = 'chg_' + Date.now();
  let diffHtml = changes.map(c =>
    `<div class="diff-row"><span class="diff-label">${c.field}</span><span class="diff-before">${esc(String(c.from || '(empty)'))}</span><span class="diff-arrow">→</span><span class="diff-after">${esc(String(c.to || '(empty)'))}</span></div>`
  ).join('');

  addSystem(`<div class="change-preview" id="${previewId}">
    <div class="change-preview-hdr">📝 Update ${esc(p.name)}</div>
    <div class="change-preview-body">${diffHtml}</div>
    <div class="change-actions">
      <button class="btn btn-cancel" onclick="dismissChange('${previewId}')">Discard</button>
      <button class="btn btn-confirm" onclick="confirmEdit('${previewId}','${p.id}',${JSON.stringify(JSON.stringify(newVals))})">Confirm Changes</button>
    </div>
  </div>`, []);
};

window.confirmEdit = function(previewId, productId, newValsJson) {
  const p = DB.products.find(x => x.id === productId);
  const newVals = JSON.parse(newValsJson);
  Object.assign(p, newVals);
  p.updated = new Date().toISOString();
  addHistory(productId, 'update', `Updated: ${Object.keys(newVals).join(', ')}`);
  const el = document.getElementById(previewId);
  if (el) el.outerHTML = `<div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);border-radius:var(--radius);padding:12px;margin:8px 0">
    <p style="color:var(--green);font-weight:700">✓ ${esc(p.name)} updated successfully.</p></div>`;
  addAudit('update', `Updated ${p.sku}: ${Object.keys(newVals).join(', ')}`);
};

function execPriceChange(direction, target, percent) {
  const products = findByTarget(target);
  if (!products.length) { addSystem(`<p>No products found matching "${esc(target)}".</p>`, ['Show all products']); return; }
  const isUp = /increase|raise/i.test(direction);
  const multiplier = isUp ? (1 + percent/100) : (1 - percent/100);
  const previewId = 'chg_' + Date.now();

  let diffHtml = products.slice(0, 10).map(p => {
    const newPrice = Math.round(p.price * multiplier * 100) / 100;
    return `<div class="diff-row"><span class="diff-label">${esc(p.sku)}</span><span class="diff-before">${fmtPrice(p.price)}</span><span class="diff-arrow">→</span><span class="diff-after">${fmtPrice(newPrice)}</span></div>`;
  }).join('');
  if (products.length > 10) diffHtml += `<p style="font-size:12px;color:var(--muted);padding-top:6px">...and ${products.length - 10} more products</p>`;

  addSystem(`<div class="change-preview" id="${previewId}">
    <div class="change-preview-hdr">💰 ${isUp?'Increase':'Decrease'} price by ${percent}% — ${products.length} product${products.length!==1?'s':''}</div>
    <div class="change-preview-body">${diffHtml}</div>
    <div class="change-actions">
      <button class="btn btn-cancel" onclick="dismissChange('${previewId}')">Cancel</button>
      <button class="btn btn-confirm" onclick="confirmPriceChange('${previewId}','${target}',${multiplier})">Apply Price Change</button>
    </div>
  </div>`, []);
}

window.confirmPriceChange = function(previewId, target, multiplier) {
  const products = findByTarget(target);
  products.forEach(p => { p.price = Math.round(p.price * multiplier * 100) / 100; p.updated = new Date().toISOString(); });
  const el = document.getElementById(previewId);
  if (el) el.outerHTML = `<div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);border-radius:var(--radius);padding:12px;margin:8px 0">
    <p style="color:var(--green);font-weight:700">✓ Prices updated for ${products.length} product${products.length!==1?'s':''}.</p></div>`;

};

function execCompare(a, b) {
  const pa = DB.products.find(p => p.sku.toLowerCase() === a.toLowerCase() || p.name.toLowerCase().includes(a.toLowerCase()));
  const pb = DB.products.find(p => p.sku.toLowerCase() === b.toLowerCase() || p.name.toLowerCase().includes(b.toLowerCase()));
  if (!pa || !pb) { addSystem(`<p>Could not find both products to compare. Make sure both exist.</p>`, ['Show all products']); return; }

  const fields = [
    ['Name', pa.name, pb.name],
    ['SKU', pa.sku, pb.sku],
    ['Brand', pa.brand, pb.brand],
    ['Price', fmtPrice(pa.price), fmtPrice(pb.price)],
    ['Status', pa.status, pb.status],
    ['Category', catName(pa.category), catName(pb.category)],
    ['Weight', pa.weight||'—', pb.weight||'—'],
    ['Material', pa.material||'—', pb.material||'—'],
    ['EAN', pa.ean||'—', pb.ean||'—'],
    ['Quality', completeness(pa)+'%', completeness(pb)+'%'],
    ['Description', pa.description ? 'Yes' : 'Missing', pb.description ? 'Yes' : 'Missing']
  ];

  const cols = `repeat(3,1fr)`;
  let html = `<p><strong>Product Comparison</strong></p>
  <div class="compare-grid" style="grid-template-columns:120px 1fr 1fr">
    <div class="compare-cell compare-header">Field</div>
    <div class="compare-cell compare-product">${esc(pa.name)}</div>
    <div class="compare-cell compare-product">${esc(pb.name)}</div>`;
  fields.forEach(([label, va, vb]) => {
    const diff = va !== vb;
    html += `<div class="compare-cell" style="font-weight:600;color:var(--muted)">${label}</div>
    <div class="compare-cell ${diff?'compare-diff':''}">${esc(String(va))}</div>
    <div class="compare-cell ${diff?'compare-diff':''}">${esc(String(vb))}</div>`;
  });
  html += '</div>';
  addSystem(html, [`Edit ${pa.sku}`, `Edit ${pb.sku}`, `Show all products`]);
}

function execDuplicates() {
  const found = [];
  const checked = new Set();
  DB.products.forEach(p => {
    if (checked.has(p.id)) return;
    const dupes = findDuplicates(p);
    if (dupes.length) {
      found.push({ product: p, duplicates: dupes });
      checked.add(p.id);
      dupes.forEach(d => checked.add(d.id));
    }
  });
  if (!found.length) {
    addSystem('<p style="color:var(--green);font-weight:700">✓ No potential duplicates found. Your catalog is clean!</p>', ['Show all products', 'Data quality report']);
    return;
  }
  let html = `<p><strong>Potential Duplicates Found</strong></p><p style="font-size:13px;color:var(--muted);margin:6px 0">Found ${found.length} group${found.length!==1?'s':''} of similar products:</p>`;
  found.forEach((g, i) => {
    html += `<div style="background:rgba(251,231,77,0.05);border:1px solid rgba(251,231,77,0.15);border-radius:8px;padding:10px;margin:8px 0">
      <div style="font-weight:700;font-size:13px;color:var(--yellow);margin-bottom:6px">Group ${i+1}</div>
      <div style="font-size:12px"><strong>${esc(g.product.name)}</strong> (${esc(g.product.sku)}) — ${esc(g.product.brand)} — ${fmtPrice(g.product.price)}</div>
      ${g.duplicates.map(d => `<div style="font-size:12px;color:var(--muted);padding-left:12px;border-left:2px solid rgba(251,231,77,0.3);margin-top:4px">≈ <strong>${esc(d.name)}</strong> (${esc(d.sku)}) — ${esc(d.brand)} — ${fmtPrice(d.price)}</div>`).join('')}
    </div>`;
  });
  addSystem(html, ['Show all products', `Compare ${found[0]?.product.sku} and ${found[0]?.duplicates[0]?.sku}`]);
}

function execEnrich(target) {
  const t = target.replace(/^(product|item)\s+/i, '');
  const product = DB.products.find(p => p.sku.toLowerCase() === t.toLowerCase() || p.name.toLowerCase().includes(t.toLowerCase()));
  if (!product) { addSystem(`<p>Product "${esc(target)}" not found.</p>`, ['Show all products']); return; }

  const suggestions = generateEnrichment(product);
  if (!Object.keys(suggestions).length) {
    addSystem(`<p style="color:var(--green);font-weight:700">✓ ${esc(product.name)} is already fully enriched! Quality: ${completeness(product)}%</p>`, [`Show ${product.sku}`]);
    return;
  }

  const previewId = 'chg_' + Date.now();
  let html = `<div class="change-preview" id="${previewId}">
    <div class="change-preview-hdr">✨ AI Enrichment Suggestions for ${esc(product.name)}</div>
    <div class="change-preview-body">
      <div class="enrich-card">
        ${Object.entries(suggestions).map(([field, value]) =>
          `<div class="enrich-field"><span style="font-weight:600;text-transform:capitalize">${field}:</span> <span class="enrich-value">${esc(String(value).slice(0,120))}${String(value).length>120?'...':''}</span></div>`

      <button class="btn btn-cancel" onclick="dismissChange('${previewId}')">Dismiss</button>
      <button class="btn btn-confirm" onclick="confirmEnrich('${previewId}','${product.id}',${JSON.stringify(JSON.stringify(suggestions))})">Apply Suggestions</button>

  addSystem(html, []);
}

window.confirmEnrichAll = function(previewId) {

    <div class="change-preview-body">

      <ul style="margin:6px 0 0 16px;font-size:12px;color:var(--muted)">${toPublish.map(p => `<li>${esc(p.name)} (${esc(p.sku)}) — currently <span class="status-badge status-${p.status}">${p.status}</span></li>`).join('')}</ul>
      ${toPublish.some(p => completeness(p) < 75) ? '<p style="font-size:12px;color:var(--yellow);margin-top:8px">⚠ Some products have low completeness scores. Consider enriching them first.</p>' : ''}
    </div>
    <div class="change-actions">
      <button class="btn btn-cancel" onclick="dismissChange('${previewId}')">Cancel</button>
      <button class="btn btn-confirm" onclick="confirmPublish('${previewId}','${target}')">Publish</button>
    </div>
  </div>`, []);
}

window.confirmPublish = function(previewId, target) {
  const products = findByTarget(target).filter(p => p.status !== 'active');
  products.forEach(p => { p.status = 'active'; p.updated = new Date().toISOString(); addHistory(p.id, 'publish', 'Published (set to active)'); });
  const el = document.getElementById(previewId);
  if (el) el.outerHTML = `<div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);border-radius:var(--radius);padding:12px;margin:8px 0">
    <p style="color:var(--green);font-weight:700">✓ ${products.length} product${products.length!==1?'s':''} published.</p></div>`;
  addAudit('update', `Published ${products.length} products`);
};

function execUnpublish(target) {
  const products = findByTarget(target);
  if (!products.length) { addSystem(`<p>No products found matching "${esc(target)}".</p>`, ['Show all products']); return; }
  const toArchive = products.filter(p => p.status !== 'archived');
  if (!toArchive.length) { addSystem(`<p>All matched products are already archived.</p>`, ['Show all products']); return; }

  const previewId = 'chg_' + Date.now();
  addSystem(`<div class="change-preview destructive" id="${previewId}">
    <div class="change-preview-hdr">📦 Archive ${toArchive.length} product${toArchive.length!==1?'s':''}</div>
    <div class="change-preview-body">
      <p style="font-size:13px">The following products will be set to <span class="status-badge status-archived">archived</span>:</p>
      <ul style="margin:6px 0 0 16px;font-size:12px;color:var(--muted)">${toArchive.map(p => `<li>${esc(p.name)} (${esc(p.sku)})</li>`).join('')}</ul>
    </div>
    <div class="change-actions">
      <button class="btn btn-cancel" onclick="dismissChange('${previewId}')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmUnpublish('${previewId}','${target}')">Archive</button>
    </div>
  </div>`, []);
}

window.confirmUnpublish = function(previewId, target) {
  const products = findByTarget(target).filter(p => p.status !== 'archived');
  products.forEach(p => { p.status = 'archived'; p.updated = new Date().toISOString(); addHistory(p.id, 'archive', 'Archived (unpublished)'); });
  const el = document.getElementById(previewId);
  if (el) el.outerHTML = `<div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);border-radius:var(--radius);padding:12px;margin:8px 0">
    <p style="color:var(--green);font-weight:700">✓ ${products.length} product${products.length!==1?'s':''} archived.</p></div>`;
  addAudit('update', `Archived ${products.length} products`);
};

function execHistory(target) {
  const t = target.replace(/^(product|item)\s+/i, '');
  const product = DB.products.find(p => p.sku.toLowerCase() === t.toLowerCase() || p.name.toLowerCase().includes(t.toLowerCase()));
  if (!product) { addSystem(`<p>Product "${esc(target)}" not found.</p>`, ['Show all products']); return; }

  const history = (DB.history[product.id] || []).slice().reverse();
  if (!history.length) {
    addSystem(`<p>No history found for <strong>${esc(product.name)}</strong>.</p>`, [`Show ${product.sku}`]);
    return;
  }

  let html = `<p><strong>Change History: ${esc(product.name)}</strong> <span class="sku">${esc(product.sku)}</span></p>
  <div style="margin:10px 0">`;
  history.forEach(h => {
    const colors = { created:'var(--green)', update:'var(--blue)', publish:'var(--green)', archive:'var(--orange)', enrich:'var(--purple)', label:'var(--yellow)' };
    html += `<div class="history-entry">
      <div class="history-dot" style="background:${colors[h.action]||'var(--muted)'}"></div>
      <div style="flex:1"><div>${esc(h.detail)}</div><div class="history-time">${esc(h.user)} · ${new Date(h.time).toLocaleString()}</div></div>
    </div>`;
  });
  html += '</div>';
  addSystem(html, [`Edit ${product.sku}`, `Enrich ${product.sku}`, 'Show all products']);
}

function execRelationships(target) {
  const t = target.replace(/^(product|item)\s+/i, '');
  const product = DB.products.find(p => p.sku.toLowerCase() === t.toLowerCase() || p.name.toLowerCase().includes(t.toLowerCase()));
  if (!product) { addSystem(`<p>Product "${esc(target)}" not found.</p>`, ['Show all products']); return; }

  const rels = getRelationships(product.id);
  if (!rels.length) {
    addSystem(`<p><strong>${esc(product.name)}</strong> has no relationships defined.</p><p style="font-size:13px;color:var(--muted);margin-top:4px">You can add one: "Add related ELEC-003 to ${product.sku}"</p>`,
    [`Add related product to ${product.sku}`]);
    return;
  }

  const byType = {};
  rels.forEach(r => { if (!byType[r.type]) byType[r.type] = []; byType[r.type].push(r.product); });

  let html = `<p><strong>Relationships for ${esc(product.name)}</strong> <span class="sku">${esc(product.sku)}</span></p>`;
  for (const [type, products] of Object.entries(byType)) {
    html += `<div style="margin:10px 0"><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px">${type}</div>`;
    html += products.map(p => `<div class="rel-chip" onclick="openDetail('${p.id}')">${esc(p.name)} <span class="sku">${esc(p.sku)}</span></div>`).join('');
    html += '</div>';
  }
  addSystem(html, [`Add related product to ${product.sku}`, `Compare ${product.sku} and ${rels[0]?.product.sku}`]);
}

function execAddRelationship(relType, fromTarget, toTarget) {
  const fromP = DB.products.find(p => p.sku.toLowerCase() === fromTarget.toLowerCase() || p.name.toLowerCase().includes(fromTarget.toLowerCase()));
  const toP = DB.products.find(p => p.sku.toLowerCase() === toTarget.toLowerCase() || p.name.toLowerCase().includes(toTarget.toLowerCase()));
  if (!fromP || !toP) { addSystem('<p>Could not find both products. Check the SKUs or names.</p>', ['Show all products']); return; }
  if (fromP.id === toP.id) { addSystem('<p>Cannot create a relationship between a product and itself.</p>', []); return; }

  const exists = DB.relationships.find(r => r.from === fromP.id && r.to === toP.id && r.type === relType);
  if (exists) { addSystem(`<p>This ${relType} relationship already exists.</p>`, [`Related products for ${fromP.sku}`]); return; }

  DB.relationships.push({ from: fromP.id, to: toP.id, type: relType });
  addHistory(fromP.id, 'update', `Added ${relType}: ${toP.name}`);
  addAudit('update', `Added ${relType} relationship: ${fromP.sku} → ${toP.sku}`);
  addSystem(
    `<p style="color:var(--green);font-weight:700">✓ Added ${relType} relationship</p>
    <p style="font-size:13px;margin-top:4px">${esc(fromP.name)} → ${esc(toP.name)}</p>`,
    [`Related products for ${fromP.sku}`, 'Show all products']
  );
}

function execMoveCategory(target, categoryName) {
  const product = DB.products.find(p => p.sku.toLowerCase() === target.toLowerCase() || p.name.toLowerCase().includes(target.toLowerCase()));
  if (!product) { addSystem(`<p>Product "${esc(target)}" not found.</p>`, ['Show all products']); return; }
  const cat = DB.categories.find(c => c.name.toLowerCase().includes(categoryName.toLowerCase()));

    <div class="change-preview-body">
      <div class="diff-row"><span class="diff-label">Product</span><span style="font-weight:600">${esc(product.name)} (${esc(product.sku)})</span></div>
      <div class="diff-row"><span class="diff-label">Category</span><span class="diff-before">${esc(oldCat)}</span><span class="diff-arrow">→</span><span class="diff-after">${esc(cat.name)}</span></div>

function execClone(target) {
  const t = target.replace(/^(product|item)\s+/i, '');
  const product = DB.products.find(p => p.sku.toLowerCase() === t.toLowerCase() || p.name.toLowerCase().includes(t.toLowerCase()));
  if (!product) { addSystem(`<p>Product "${esc(target)}" not found.</p>`, ['Show all products']); return; }

  const newSku = product.sku + '-COPY';
  const newId = genId('prod');
  const clone = {
    ...JSON.parse(JSON.stringify(product)),
    id: newId, sku: newSku, name: product.name + ' (Copy)',
    status: 'draft', created: new Date().toISOString(), updated: new Date().toISOString()
  };
  DB.products.push(clone);
  DB.history[newId] = [{ time: new Date().toISOString(), user: 'You', action: 'created', detail: `Cloned from ${product.sku}` }];
  addAudit('create', `Cloned ${product.sku} → ${newSku}`);
  addSystem(
    `<p style="color:var(--green);font-weight:700">✓ Product cloned successfully</p>
    <p style="font-size:13px;margin-top:4px"><strong>${esc(product.name)}</strong> → <strong>${esc(clone.name)}</strong> (${esc(newSku)})</p>
    <p style="font-size:12px;color:var(--muted);margin-top:4px">The clone is saved as <span class="status-badge status-draft">draft</span>. Edit it to customize.</p>`,
    [`Edit ${newSku}`, `Show ${newSku}`, 'Show all products']
  );
}

// ============ DATA VIEWER MODE ============

let currentMode = 'chat';
let dataFilter = 'all';
let dataSort = { key: 'name', asc: true };
let selectedIds = new Set();
let pendingChanges = {}; // { productId: { field: newValue, ... } }

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

  const chatArea = document.getElementById('chat-area');
  const inputArea = document.getElementById('input-area');
  const dropOverlay = document.getElementById('drop-overlay');
  const dataView = document.getElementById('data-view');
  const newChatBtn = document.getElementById('new-chat-btn');

  if (mode === 'data') {
    chatArea.classList.add('hidden');
    inputArea.classList.add('hidden');
    dropOverlay.classList.add('hidden');
    dataView.classList.add('active');
    newChatBtn.style.display = 'none';
    renderDataGrid();
    document.getElementById('status-text').textContent = 'Data View — click any cell to edit · changes are tracked';
  } else {
    chatArea.classList.remove('hidden');
    inputArea.classList.remove('hidden');
    dropOverlay.classList.remove('hidden');
    dataView.classList.remove('active');
    newChatBtn.style.display = '';
    document.getElementById('status-text').textContent = 'PIM Agent ready — all systems operational';
  }
}

function setDataFilter(filter) {
  dataFilter = filter;
  document.querySelectorAll('.data-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  selectedIds.clear();
  renderDataGrid();
}

function getFilteredProducts() {
  let products = [...DB.products];
  const search = (document.getElementById('data-search')?.value || '').toLowerCase();
  if (search) {
    products = products.filter(p =>
      p.name.toLowerCase().includes(search) ||
      p.sku.toLowerCase().includes(search) ||
      (p.brand || '').toLowerCase().includes(search) ||
      (p.description || '').toLowerCase().includes(search)
    );
  }
  if (dataFilter !== 'all') products = products.filter(p => p.status === dataFilter);

  // Sort
  products.sort((a, b) => {
    let va = a[dataSort.key] || '', vb = b[dataSort.key] || '';
    if (dataSort.key === 'price') { va = Number(va) || 0; vb = Number(vb) || 0; }
    if (dataSort.key === 'completeness') { va = completeness(a); vb = completeness(b); }
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return dataSort.asc ? -1 : 1;
    if (va > vb) return dataSort.asc ? 1 : -1;
    return 0;
  });
  return products;
}

function sortBy(key) {
  if (dataSort.key === key) dataSort.asc = !dataSort.asc;
  else { dataSort.key = key; dataSort.asc = true; }
  renderDataGrid();
}

function renderDataGrid() {
  const products = getFilteredProducts();
  const head = document.getElementById('data-grid-head');
  const body = document.getElementById('data-grid-body');

  // Header
  const cols = [
    { key: 'cb', label: '', nosort: true },
    { key: 'sku', label: 'SKU' },
    { key: 'name', label: 'Product Name' },
    { key: 'brand', label: 'Brand' },
    { key: 'category', label: 'Category' },
    { key: 'price', label: 'Price' },
    { key: 'status', label: 'Status' },
    { key: 'labels', label: 'Labels', nosort: true },
    { key: 'completeness', label: 'Quality' },
    { key: 'actions', label: '', nosort: true }
  ];

  head.innerHTML = '<tr>' + cols.map(c => {
    if (c.key === 'cb') return `<th class="cb-cell"><input type="checkbox" id="header-cb" onchange="toggleSelectAll(this.checked)" ${selectedIds.size === products.length && products.length > 0 ? 'checked' : ''}></th>`;
    if (c.nosort) return `<th>${c.label}</th>`;
    const sorted = dataSort.key === c.key;
    const arrow = sorted ? (dataSort.asc ? '▲' : '▼') : '▲';
    return `<th class="${sorted ? 'sorted' : ''}" onclick="sortBy('${c.key}')">${c.label} <span class="sort-icon">${arrow}</span></th>`;
  }).join('') + '</tr>';

  // Body
  body.innerHTML = products.map(p => {
    const sel = selectedIds.has(p.id);
    const cat = DB.categories.find(c => c.id === p.category);
    const comp = completeness(p);
    const qClass = comp >= 75 ? 'var(--green)' : comp >= 50 ? 'var(--yellow)' : 'var(--red)';
    const changes = pendingChanges[p.id];
    const rowClass = sel ? 'selected' : '';

    // Labels
    const labelHtml = (p.labels || []).map(lid => {
      const l = DB.labels.find(lb => lb.id === lid);
      return l ? `<span class="label-chip-sm" style="background:${l.color}22;color:${l.color}">${esc(l.name)}</span>` : '';
    }).join('');

    // Get displayed values (showing pending changes if any)
    const displayName = changes?.name ?? p.name;
    const displayBrand = changes?.brand ?? p.brand ?? '';
    const displayPrice = changes?.price ?? p.price;
    const displayStatus = changes?.status ?? p.status;

    const statusClass = `status-${displayStatus}`;
    const changedMark = changes ? ' style="border-left:3px solid var(--yellow)"' : '';

    return `<tr class="${rowClass}"${changedMark}>
      <td class="cb-cell"><input type="checkbox" ${sel ? 'checked' : ''} onchange="toggleSelect('${p.id}', this.checked)"></td>
      <td class="sku-cell">${esc(p.sku)}</td>
      <td class="name-cell" onclick="selectProduct('${p.id}')" title="Click to view details">${esc(displayName)}</td>
      <td ondblclick="startEdit(this, '${p.id}', 'brand')">${esc(displayBrand)}</td>
      <td>${cat ? esc(cat.name) : '—'}</td>
      <td class="price-cell" ondblclick="startEdit(this, '${p.id}', 'price')">$${Number(displayPrice).toFixed(2)}</td>
      <td ondblclick="startEditStatus(this, '${p.id}')"><span class="status-badge ${statusClass}">${displayStatus}</span></td>
      <td><div class="label-chips">${labelHtml || '<span style="color:var(--muted);font-size:11px">—</span>'}</div></td>
      <td><div class="quality-mini"><div class="quality-mini-fill" style="width:${comp}%;background:${qClass}"></div></div>${comp}%</td>
      <td><div class="action-btns">
        <button class="action-btn" onclick="selectProduct('${p.id}')" title="View details">👁</button>
        <button class="action-btn danger" onclick="confirmDeleteSingle('${p.id}')" title="Delete">🗑</button>
      </div></td>
    </tr>`;
  }).join('');

  // Update counts
  document.getElementById('data-count').textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;

  // Bulk bar
  const bulkBar = document.getElementById('data-bulk-bar');
  if (selectedIds.size > 0) {
    bulkBar.classList.add('active');
    document.getElementById('sel-count').textContent = selectedIds.size;
  } else {
    bulkBar.classList.remove('active');
  }

  // Changes bar
  updateChangesBar();
}

function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  renderDataGrid();
}

function toggleSelectAll(checked) {
  const products = getFilteredProducts();
  if (checked) products.forEach(p => selectedIds.add(p.id));
  else selectedIds.clear();
  renderDataGrid();
}

function clearSelection() {
  selectedIds.clear();
  renderDataGrid();
}

// Inline editing
function startEdit(td, productId, field) {
  if (td.querySelector('.inline-edit')) return;
  const product = DB.products.find(p => p.id === productId);
  const currentVal = pendingChanges[productId]?.[field] ?? product[field] ?? '';

  td.classList.add('editing');
  const input = document.createElement('input');
  input.className = 'inline-edit';
  input.value = currentVal;
  input.type = field === 'price' ? 'number' : 'text';
  if (field === 'price') input.step = '0.01';
  td.textContent = '';
  td.appendChild(input);
  input.focus();
  input.select();

  const finish = () => {
    const newVal = field === 'price' ? parseFloat(input.value) || 0 : input.value.trim();
    const origVal = product[field];
    td.classList.remove('editing');

    if (newVal !== origVal && String(newVal) !== String(origVal)) {
      if (!pendingChanges[productId]) pendingChanges[productId] = {};
      pendingChanges[productId][field] = newVal;
    } else if (pendingChanges[productId]) {
      delete pendingChanges[productId][field];
      if (Object.keys(pendingChanges[productId]).length === 0) delete pendingChanges[productId];
    }
    renderDataGrid();
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { td.classList.remove('editing'); renderDataGrid(); }
  });
}

function startEditStatus(td, productId) {
  if (td.querySelector('.inline-edit-select')) return;
  const product = DB.products.find(p => p.id === productId);
  const currentVal = pendingChanges[productId]?.status ?? product.status;

  td.classList.add('editing');
  const select = document.createElement('select');
  select.className = 'inline-edit-select';
  ['active', 'draft', 'archived'].forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
    if (s === currentVal) opt.selected = true;
    select.appendChild(opt);
  });
  td.textContent = '';
  td.appendChild(select);
  select.focus();

  const finish = () => {
    const newVal = select.value;
    if (newVal !== product.status) {
      if (!pendingChanges[productId]) pendingChanges[productId] = {};
      pendingChanges[productId].status = newVal;
    } else if (pendingChanges[productId]) {
      delete pendingChanges[productId].status;
      if (Object.keys(pendingChanges[productId]).length === 0) delete pendingChanges[productId];
    }
    renderDataGrid();
  };

  select.addEventListener('blur', finish);
  select.addEventListener('change', () => select.blur());
}

function updateChangesBar() {
  const bar = document.getElementById('changes-bar');
  const count = Object.keys(pendingChanges).length;
  if (count > 0) {
    bar.classList.add('active');
    document.getElementById('changes-count').textContent = count;
    const summaries = [];
    for (const [pid, changes] of Object.entries(pendingChanges)) {
      const p = DB.products.find(pr => pr.id === pid);
      if (p) summaries.push(`${p.sku}: ${Object.keys(changes).join(', ')}`);
    }
    document.getElementById('changes-list').textContent = summaries.join(' · ');
  } else {
    bar.classList.remove('active');
  }
}

function discardChanges() {
  pendingChanges = {};
  renderDataGrid();
  showToast('Changes discarded', 'var(--muted)');
}

function saveChanges() {
  let count = 0;
  for (const [pid, changes] of Object.entries(pendingChanges)) {
    const p = DB.products.find(pr => pr.id === pid);
    if (!p) continue;
    for (const [field, val] of Object.entries(changes)) {
      p[field] = val;
    }
    p.updated = new Date().toISOString();
    if (!DB.history[pid]) DB.history[pid] = [];
    DB.history[pid].push({ action: 'updated', detail: `Edited in Data View: ${Object.keys(changes).join(', ')}`, user: 'You', time: new Date().toISOString() });
    count++;
  }
  pendingChanges = {};
  render();
  renderDataGrid();
  showToast(`✓ Saved changes to ${count} product${count !== 1 ? 's' : ''}`, 'var(--green)');
}

function showToast(msg, color) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span style="color:${color || 'var(--white)'}">${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, 2500);
}

function confirmDeleteSingle(productId) {
  const p = DB.products.find(pr => pr.id === productId);
  if (!p) return;
  openModal(`
    <p style="font-weight:700;font-size:16px;margin-bottom:8px">Delete Product?</p>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">This will permanently remove <strong style="color:var(--white)">${esc(p.name)}</strong> (${esc(p.sku)}).</p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doDeleteProduct('${p.id}'); closeModal()">Delete</button>
    </div>
  `);
}

function doDeleteProduct(id) {
  DB.products = DB.products.filter(p => p.id !== id);
  delete pendingChanges[id];
  selectedIds.delete(id);
  render();
  if (currentMode === 'data') renderDataGrid();
  showToast('Product deleted', 'var(--red)');
}

// Bulk actions
function bulkSetStatus(status) {
  const count = selectedIds.size;
  if (!count) return;
  selectedIds.forEach(id => {
    if (!pendingChanges[id]) pendingChanges[id] = {};
    pendingChanges[id].status = status;
  });
  renderDataGrid();
  showToast(`Marked ${count} product${count > 1 ? 's' : ''} as ${status} (unsaved)`, 'var(--yellow)');
}

function bulkAddLabel() {
  let labelsHtml = DB.labels.map(l =>
    `<button class="btn btn-cancel" style="font-size:12px;margin:3px" onclick="doBulkAddLabel('${l.id}');closeModal()">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${l.color};margin-right:6px"></span>${esc(l.name)}
    </button>`
  ).join('');

  openModal(`
    <p style="font-weight:700;font-size:16px;margin-bottom:8px">Add Label to ${selectedIds.size} product${selectedIds.size > 1 ? 's' : ''}</p>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Choose a label to apply:</p>
    <div style="display:flex;flex-wrap:wrap;gap:4px">${labelsHtml}</div>
    <div style="margin-top:12px;display:flex;justify-content:flex-end"><button class="btn btn-cancel" onclick="closeModal()">Cancel</button></div>
  `);
}

function doBulkAddLabel(labelId) {
  selectedIds.forEach(id => {
    const p = DB.products.find(pr => pr.id === id);
    if (p && !p.labels.includes(labelId)) {
      p.labels.push(labelId);
      p.updated = new Date().toISOString();
    }
  });
  render();
  if (currentMode === 'data') renderDataGrid();
  const lbl = DB.labels.find(l => l.id === labelId);
  showToast(`Added "${lbl?.name}" to ${selectedIds.size} products`, 'var(--green)');
}

function bulkDelete() {
  const count = selectedIds.size;
  openModal(`
    <p style="font-weight:700;font-size:16px;margin-bottom:8px;color:var(--red)">⚠️ Delete ${count} product${count > 1 ? 's' : ''}?</p>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">This action cannot be undone. The following products will be permanently removed:</p>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:12px">
      ${[...selectedIds].map(id => {
        const p = DB.products.find(pr => pr.id === id);
        return p ? `<div style="font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03)"><strong>${esc(p.name)}</strong> <span style="color:var(--muted)">${esc(p.sku)}</span></div>` : '';
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doBulkDelete();closeModal()">Delete ${count} products</button>
    </div>
  `);
}

function doBulkDelete() {
  const count = selectedIds.size;
  DB.products = DB.products.filter(p => !selectedIds.has(p.id));
  selectedIds.forEach(id => delete pendingChanges[id]);
  selectedIds.clear();
  render();
  if (currentMode === 'data') renderDataGrid();
  showToast(`Deleted ${count} products`, 'var(--red)');
}

// ============ IMPORT / DATA ONBOARDING ============

const IMPORT_FIELDS = [
  { key: 'name', label: 'Product Name', required: true, aliases: ['product name','title','product','product title','item name','item'] },
  { key: 'sku', label: 'SKU', required: true, aliases: ['sku','sku code','product code','item code','article number','article no','art no','item number','item no','code','id','product id'] },
  { key: 'brand', label: 'Brand', required: false, aliases: ['brand','brand name','manufacturer','vendor','make'] },
  { key: 'price', label: 'Price', required: false, aliases: ['price','unit price','retail price','cost','msrp','amount','rrp','selling price'] },
  { key: 'description', label: 'Description', required: false, aliases: ['description','desc','product description','details','long description','body','text','about'] },
  { key: 'category', label: 'Category', required: false, aliases: ['category','product category','cat','department','type','product type','group','classification'] },
  { key: 'status', label: 'Status', required: false, aliases: ['status','state','active','published','availability'] },
  { key: 'weight', label: 'Weight', required: false, aliases: ['weight','weight (kg)','weight kg','mass','net weight'] },
  { key: 'material', label: 'Material', required: false, aliases: ['material','materials','fabric','composition','made of'] },
  { key: 'color', label: 'Color', required: false, aliases: ['color','colour','colors','colours'] },
  { key: 'ean', label: 'EAN/Barcode', required: false, aliases: ['ean','barcode','upc','gtin','ean13','isbn'] },
];

let importState = { rawData: null, headers: null, mapping: {}, fileName: '' };

// Drag & drop on main area
const mainEl = document.getElementById('main');
mainEl.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('active'); });
mainEl.addEventListener('dragleave', e => {
  if (!mainEl.contains(e.relatedTarget)) document.getElementById('drop-overlay').classList.remove('active');
});
mainEl.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) handleFileSelect(file);
});

function handleFileSelect(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['csv','tsv','xlsx','xls'].includes(ext)) {
    addSystem(`<p style="color:var(--red)">⚠️ Unsupported file type: <strong>.${esc(ext)}</strong></p><p style="font-size:13px;color:var(--muted)">Please use CSV, TSV, or Excel (.xlsx) files.</p>`, ['Download template']);
    return;
  }
  importState.fileName = file.name;
  addUser(`📎 Uploaded: ${file.name}`);
  showTyping();

  if (ext === 'csv' || ext === 'tsv') {
    const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result;
      parseCSV(text, ext === 'tsv' ? '\t' : null);
    };
    reader.readAsText(file);
  } else {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
        processRawData(data);
      } catch (err) {
        hideTyping();
        addSystem(`<p style="color:var(--red)">⚠️ Failed to read Excel file.</p><p style="font-size:13px;color:var(--muted)">${esc(err.message)}</p>`, ['Download template', 'Help']);
      }
    };
    reader.readAsArrayBuffer(file);
  }
}

function parseCSV(text, forceSep) {
  // Smart separator detection
  const firstLine = text.split('\n')[0];
  let sep = forceSep || (firstLine.split('\t').length > firstLine.split(',').length ? '\t' : ',');

  const rows = [];
  let current = '', inQuotes = false, row = [], i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (ch === '"') {
      if (inQuotes && text[i+1] === '"') { current += '"'; i += 2; continue; }
      inQuotes = !inQuotes; i++; continue;
    }
    if (ch === sep && !inQuotes) { row.push(current.trim()); current = ''; i++; continue; }
    if ((ch === '\n' || ch === '\r') && !inQuotes) {
      row.push(current.trim()); if (row.some(c => c !== '')) rows.push(row); row = []; current = '';
      if (ch === '\r' && text[i+1] === '\n') i++;
      i++; continue;
    }
    current += ch; i++;
  }
  if (current || row.length) { row.push(current.trim()); if (row.some(c => c !== '')) rows.push(row); }
  processRawData(rows);
}

function processRawData(data) {
  hideTyping();
  if (!data || data.length < 2) {
    addSystem(`<p style="color:var(--yellow)">⚠️ The file appears to be empty or has only headers.</p><p style="font-size:13px;color:var(--muted)">I need at least a header row and one data row.</p>`, ['Download template']);
    return;
  }

  importState.headers = data[0].map(h => String(h).trim());
  importState.rawData = data.slice(1).filter(row => row.some(c => c !== '' && c != null));

  // Auto-map columns
  importState.mapping = {};
  importState.headers.forEach((header, idx) => {
    const hLower = header.toLowerCase().trim();
    for (const field of IMPORT_FIELDS) {
      if (field.aliases.some(a => a === hLower || hLower.includes(a) || a.includes(hLower))) {
        if (!Object.values(importState.mapping).includes(field.key)) {
          importState.mapping[idx] = field.key;
          break;
        }
      }
    }
  });

  showMappingStep();
}

function showMappingStep() {
  const h = importState.headers;
  const data = importState.rawData;
  const mapped = Object.values(importState.mapping);
  const requiredMapped = IMPORT_FIELDS.filter(f => f.required).every(f => mapped.includes(f.key));

  // Build status indicators
  const totalCols = h.length;
  const mappedCols = Object.keys(importState.mapping).length;
  const nameField = mapped.includes('name');
  const skuField = mapped.includes('sku');

  let statusHtml = '<div style="margin:8px 0">';
  statusHtml += `<div class="mapping-status"><span class="${mappedCols > 0 ? 'ok' : 'err'}">●</span> ${mappedCols} of ${totalCols} columns mapped</div>`;
  statusHtml += `<div class="mapping-status"><span class="${nameField ? 'ok' : 'err'}">●</span> Product Name: ${nameField ? 'Mapped ✓' : 'Required — not mapped'}</div>`;
  statusHtml += `<div class="mapping-status"><span class="${skuField ? 'ok' : 'err'}">●</span> SKU: ${skuField ? 'Mapped ✓' : 'Required — not mapped'}</div>`;
  statusHtml += '</div>';

  // Build mapping table
  let tableHtml = '<table class="mapping-table"><thead><tr><th>Your Column</th><th>Sample Data</th><th>Maps To</th></tr></thead><tbody>';
  h.forEach((header, idx) => {
    const sample1 = data[0] ? String(data[0][idx] || '') : '';
    const sample2 = data[1] ? String(data[1][idx] || '') : '';
    const sampleText = sample1 + (sample2 ? ', ' + sample2 : '');
    const currentMapping = importState.mapping[idx] || '';
    const fieldObj = IMPORT_FIELDS.find(f => f.key === currentMapping);

    let options = '<option value="">— Skip this column —</option>';
    IMPORT_FIELDS.forEach(f => {
      const sel = currentMapping === f.key ? 'selected' : '';
      const used = !sel && mapped.includes(f.key) ? 'disabled' : '';
      options += `<option value="${f.key}" ${sel} ${used}>${f.label}${f.required ? ' *' : ''}</option>`;
    });

    const mappedClass = currentMapping ? 'mapped' : 'unmapped';
    tableHtml += `<tr>
      <td class="col-header">${esc(header)}</td>
      <td class="sample-data" title="${esc(sampleText)}">${esc(sampleText.substring(0, 50))}</td>
      <td><select onchange="updateMapping(${idx}, this.value)" class="${mappedClass}">${options}</select></td>
    </tr>`;
  });
  tableHtml += '</tbody></table>';

  // Steps indicator
  const stepsHtml = `<div class="import-steps">
    <div class="import-step active"><span class="step-num">1</span> Map Columns</div>
    <div class="import-step-line"></div>
    <div class="import-step"><span class="step-num">2</span> Preview</div>
    <div class="import-step-line"></div>
    <div class="import-step"><span class="step-num">3</span> Import</div>
  </div>`;

  const html = `
    ${stepsHtml}
    <div style="margin-bottom:12px">
      <p style="font-weight:700;font-size:15px;margin-bottom:2px">📎 ${esc(importState.fileName)}</p>
      <p style="font-size:12px;color:var(--muted)">${data.length} row${data.length !== 1 ? 's' : ''} detected · ${totalCols} columns</p>
    </div>
    <p style="font-size:13px;color:var(--text);margin-bottom:8px">${pick(["I've auto-mapped what I could. Please review and adjust:","Here's what I detected. Fix any mappings that look wrong:","I matched your columns to PIM fields. Double-check these:"])}</p>
    ${statusHtml}
    ${tableHtml}
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-cancel" onclick="closeModal(); addSystem('<p>Import cancelled.</p>', smartSuggestions())">Cancel</button>
      <button class="btn btn-confirm" id="import-next-btn" onclick="showImportPreview()" ${!requiredMapped ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}>Next: Preview →</button>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('wide');
  openModal(html);
}

function updateMapping(colIdx, fieldKey) {
  // Remove any other column mapped to this field
  if (fieldKey) {
    for (const [k, v] of Object.entries(importState.mapping)) {
      if (v === fieldKey && parseInt(k) !== colIdx) delete importState.mapping[k];
    }
    importState.mapping[colIdx] = fieldKey;
  } else {
    delete importState.mapping[colIdx];
  }
  // Re-render mapping step
  showMappingStep();
}

function showImportPreview() {
  const data = importState.rawData;
  const mapping = importState.mapping;
  const reverseMap = {};
  for (const [colIdx, fieldKey] of Object.entries(mapping)) {
    reverseMap[fieldKey] = parseInt(colIdx);
  }

  // Build preview data
  const preview = [];
  let warnings = 0, errors = 0, duplicates = 0, ready = 0;
  data.forEach((row, rowIdx) => {
    const item = {};
    for (const field of IMPORT_FIELDS) {
      if (reverseMap[field.key] !== undefined) {
        item[field.key] = String(row[reverseMap[field.key]] || '').trim();
      }
    }
    // Validation
    let status = 'ok';
    const issues = [];
    if (!item.name) { status = 'err'; issues.push('Missing product name'); }
    if (!item.sku) { status = 'err'; issues.push('Missing SKU'); }
    if (item.sku && DB.products.some(p => p.sku.toLowerCase() === item.sku.toLowerCase())) {
      status = status === 'err' ? 'err' : 'warn'; issues.push('SKU already exists — will update'); duplicates++;
    }
    if (!item.price && !item.description) { if (status === 'ok') status = 'warn'; issues.push('Incomplete data'); warnings++; }
    if (status === 'err') errors++;
    if (status === 'ok') ready++;
    preview.push({ ...item, _status: status, _issues: issues, _rowIdx: rowIdx });
  });

  // Summary cards
  const summaryHtml = `<div class="import-summary">
    <div class="import-summary-card" style="background:rgba(61,116,244,0.1);border:1px solid rgba(61,116,244,0.2)">
      <div class="num" style="color:var(--blue)">${data.length}</div><div class="lbl" style="color:var(--muted)">Total Rows</div>
    </div>
    <div class="import-summary-card" style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2)">
      <div class="num" style="color:var(--green)">${ready}</div><div class="lbl" style="color:var(--muted)">Ready</div>
    </div>
    <div class="import-summary-card" style="background:rgba(251,231,77,0.1);border:1px solid rgba(251,231,77,0.2)">
      <div class="num" style="color:var(--yellow)">${warnings + duplicates}</div><div class="lbl" style="color:var(--muted)">Warnings</div>
    </div>
    <div class="import-summary-card" style="background:rgba(235,72,94,0.1);border:1px solid rgba(235,72,94,0.2)">
      <div class="num" style="color:var(--red)">${errors}</div><div class="lbl" style="color:var(--muted)">Errors</div>
    </div>
  </div>`;

  // Preview table (show first 15 rows)
  const mappedFields = IMPORT_FIELDS.filter(f => reverseMap[f.key] !== undefined);
  let tableHtml = '<div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px"><table class="import-preview-table"><thead><tr><th>#</th>';
  mappedFields.forEach(f => { tableHtml += `<th>${f.label}</th>`; });
  tableHtml += '<th>Status</th></tr></thead><tbody>';
  preview.slice(0, 15).forEach((item, i) => {
    tableHtml += `<tr class="row-${item._status}"><td style="color:var(--muted)">${i + 1}</td>`;
    mappedFields.forEach(f => {
      const val = item[f.key] || '';
      if (!val && f.required) tableHtml += `<td class="cell-missing">Missing</td>`;
      else if (f.key === 'sku' && item._issues.some(iss => iss.includes('exists'))) tableHtml += `<td class="cell-dup">${esc(val)} ↻</td>`;
      else tableHtml += `<td>${esc(String(val).substring(0, 40))}</td>`;
    });
    const statusColor = item._status === 'ok' ? 'var(--green)' : item._status === 'warn' ? 'var(--yellow)' : 'var(--red)';
    const statusIcon = item._status === 'ok' ? '✓' : item._status === 'warn' ? '⚠' : '✕';
    tableHtml += `<td style="color:${statusColor};font-weight:700" title="${esc(item._issues.join(', '))}">${statusIcon}</td></tr>`;
  });
  if (preview.length > 15) tableHtml += `<tr><td colspan="${mappedFields.length + 2}" style="text-align:center;color:var(--muted);font-style:italic">… and ${preview.length - 15} more rows</td></tr>`;
  tableHtml += '</tbody></table></div>';

  // Steps indicator
  const stepsHtml = `<div class="import-steps">
    <div class="import-step done"><span class="step-num">✓</span> Map Columns</div>
    <div class="import-step-line"></div>
    <div class="import-step active"><span class="step-num">2</span> Preview</div>
    <div class="import-step-line"></div>
    <div class="import-step"><span class="step-num">3</span> Import</div>
  </div>`;

  const validCount = preview.filter(p => p._status !== 'err').length;
  const html = `
    ${stepsHtml}
    <p style="font-weight:700;font-size:15px;margin-bottom:4px">Review import data</p>
    <p style="font-size:12px;color:var(--muted);margin-bottom:8px">${pick(["Here's what will happen. Review carefully:","Take a look — nothing is imported yet:","Preview below. I'll only import once you confirm:"])}</p>
    ${summaryHtml}
    ${duplicates > 0 ? `<p style="font-size:12px;color:var(--yellow);margin-bottom:8px">↻ <strong>${duplicates}</strong> product${duplicates>1?'s':''} with matching SKUs will be <strong>updated</strong>, not duplicated.</p>` : ''}
    ${errors > 0 ? `<p style="font-size:12px;color:var(--red);margin-bottom:8px">✕ <strong>${errors}</strong> row${errors>1?'s':''} have errors and will be <strong>skipped</strong>.</p>` : ''}
    ${tableHtml}
    <div style="display:flex;gap:8px;justify-content:space-between;margin-top:14px;align-items:center">
      <button class="btn btn-cancel" onclick="showMappingStep()" style="font-size:11px">← Back to Mapping</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-cancel" onclick="closeModal(); addSystem('<p>Import cancelled. No changes made.</p>', smartSuggestions())">Cancel</button>
        <button class="btn btn-confirm" onclick="executeImport()" ${validCount === 0 ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}">Import ${validCount} product${validCount!==1?'s':''} →</button>
      </div>
    </div>
  `;

  // Store preview for execution
  importState.preview = preview;
  openModal(html);
}

function executeImport() {
  const preview = importState.preview;
  const valid = preview.filter(p => p._status !== 'err');
  let created = 0, updated = 0;

  valid.forEach(item => {
    const existingIdx = DB.products.findIndex(p => p.sku.toLowerCase() === (item.sku || '').toLowerCase());

    // Resolve category
    let catId = 'cat-elec'; // default
    if (item.category) {
      const found = DB.categories.find(c => c.name.toLowerCase().includes(item.category.toLowerCase()));
      if (found) catId = found.id;
    }

    // Resolve status
    let status = 'draft';
    if (item.status) {
      const s = item.status.toLowerCase();
      if (['active','published','live','yes','true','1'].includes(s)) status = 'active';
      else if (['archived','inactive','discontinued','no','false','0'].includes(s)) status = 'archived';
    }

    const price = parseFloat(String(item.price || '0').replace(/[^0-9.]/g, '')) || 0;
    const weight = item.weight ? parseFloat(String(item.weight).replace(/[^0-9.]/g, '')) : null;

    if (existingIdx >= 0) {
      // Update existing
      const p = DB.products[existingIdx];
      if (item.name) p.name = item.name;
      if (item.brand) p.brand = item.brand;
      if (price > 0) p.price = price;
      if (item.description) p.description = item.description;
      if (item.category) p.category = catId;
      if (item.material) p.material = item.material;
      if (item.color) p.color = item.color;
      if (weight) p.weight = weight;
      if (item.ean) p.ean = item.ean;
      addHistory(p.id, 'update', 'Updated via file import');
      updated++;
    } else {
      // Create new
      const newId = 'prod_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
      const product = {
        id: newId,
        sku: item.sku || ('IMP-' + String(created + 1).padStart(3, '0')),
        name: item.name || 'Unnamed Product',
        brand: item.brand || '',
        price: price,
        description: item.description || '',
        category: catId,
        status: status,
        weight: weight,
        material: item.material || '',
        color: item.color || '',
        ean: item.ean || '',
        labels: [],
        created: new Date().toISOString(),
        updated: new Date().toISOString()
      };
      DB.products.push(product);
      addHistory(newId, 'created', 'Imported from ' + importState.fileName);
      created++;
    }
  });

  const skipped = preview.length - valid.length;
  closeModal();
  document.getElementById('modal-overlay').classList.remove('wide');
  render();

  // Success message
  addSystem(
    `<div style="text-align:center;padding:10px 0">
      <div style="font-size:40px;margin-bottom:8px">✅</div>
      <p style="font-size:16px;font-weight:800;color:var(--green);margin-bottom:4px">Import Complete!</p>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">${esc(importState.fileName)}</p>
    </div>
    <div class="import-summary">
      <div class="import-summary-card" style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2)">
        <div class="num" style="color:var(--green)">${created}</div><div class="lbl" style="color:var(--muted)">Created</div>
      </div>
      <div class="import-summary-card" style="background:rgba(61,116,244,0.1);border:1px solid rgba(61,116,244,0.2)">
        <div class="num" style="color:var(--blue)">${updated}</div><div class="lbl" style="color:var(--muted)">Updated</div>
      </div>
      <div class="import-summary-card" style="background:rgba(235,72,94,0.1);border:1px solid rgba(235,72,94,0.2)">
        <div class="num" style="color:var(--red)">${skipped}</div><div class="lbl" style="color:var(--muted)">Skipped</div>
      </div>
      <div class="import-summary-card" style="background:rgba(167,139,255,0.1);border:1px solid rgba(167,139,255,0.2)">
        <div class="num" style="color:var(--purple)">${DB.products.length}</div><div class="lbl" style="color:var(--muted)">Total Now</div>
      </div>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px">All changes are logged in the audit trail. ${created > 0 ? 'New products were added as <strong>drafts</strong> — review and publish when ready.' : ''}</p>`,
    ['Show all products', 'Data quality report', 'Show draft products']
  );

  // Reset file input
  document.getElementById('file-input').value = '';
  importState = { rawData: null, headers: null, mapping: {}, fileName: '' };
}

function addHistory(productId, action, detail) {
  if (!DB.history[productId]) DB.history[productId] = [];
  DB.history[productId].push({ action, detail, user: 'You', time: new Date().toISOString() });
}

function execImport() {
  addSystem(
    `<p>${pick(["Let's import some data!","Ready to bring in products!","Sure — I can import from files or you can drag & drop."])}</p>
    <div class="import-upload-zone" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <h4>Click here to select a file</h4>
      <p>CSV, TSV, or Excel (.xlsx) — or just drag & drop anywhere</p>
    </div>
    <p style="font-size:12px;color:var(--muted)">You can also drag and drop a file directly onto the chat area, or click the <strong>↑ upload button</strong> next to the input field.</p>
    <p style="font-size:12px;color:var(--muted);margin-top:4px">💡 Need a template? Say <strong>"download template"</strong> to get a ready-made CSV.</p>`,
    ['Download template', 'Show all products']
  );
}

function execDownloadTemplate() {
  const headers = ['SKU','Product Name','Brand','Price','Description','Category','Status','Weight','Material','Color','EAN'];
  const sample = [
    ['SAMPLE-001','Example Product','Brand Name','29.99','A great product description','Electronics','draft','0.5','Aluminum','Black','1234567890123'],
    ['SAMPLE-002','Another Product','Other Brand','49.99','Another description','Clothing','active','0.3','Cotton','Blue','9876543210987']
  ];
  const csv = [headers, ...sample].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'pim-import-template.csv'; a.click();
  URL.revokeObjectURL(url);

  addSystem(
    `<p style="color:var(--green);font-weight:700">✓ Template downloaded!</p>
    <p style="font-size:13px;color:var(--muted);margin-top:6px">The CSV template includes these columns:</p>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin:8px 0">${headers.map(h => `<span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;background:rgba(61,116,244,0.1);color:#8BAAFF">${h}</span>`).join('')}</div>
    <p style="font-size:12px;color:var(--muted)">Fill in your data, then drag the file here or say <strong>"import data"</strong>. Only <strong>SKU</strong> and <strong>Product Name</strong> are required — I'll handle the rest.</p>`,
    ['Import data', 'Show all products']
  );
}

// ============ NEW CHAT ============
function startNewChat() {
  // Reset conversation state
  convo.lastAction = null;
  convo.lastProducts = [];
  convo.lastProduct = null;
  convo.lastQuery = '';
  convo.pendingConfirm = null;
  convo.pendingChoice = null;
  convo.history = [];
  convo.mood = 'neutral';

  // Clear chat area
  const chatArea = document.getElementById('chat-area');
  chatArea.innerHTML = '';

  // Show fresh welcome
  const hour = new Date().getHours();
  const timeGreet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const drafts = DB.products.filter(p => p.status === 'draft').length;
  const lowQ = DB.products.filter(p => completeness(p) < 50).length;
  let proactiveHint = '';
  if (drafts > 0) proactiveHint = `<p style="margin-top:8px;font-size:13px;color:var(--yellow)">📋 You have <strong>${drafts} draft product${drafts>1?'s':''}</strong> that might need attention.</p>`;
  if (lowQ > 0) proactiveHint += `<p style="margin-top:4px;font-size:13px;color:var(--orange)">⚠️ <strong>${lowQ} product${lowQ>1?'s':''}</strong> have low data quality — I can help enrich them.</p>`;

  setTimeout(() => {
    addSystem(
      `<p><strong>${timeGreet}! 👋 Fresh start.</strong></p>
      <p style="margin-top:6px;color:var(--muted)">Chat cleared. Your catalog data is untouched — <strong style="color:var(--white)">${DB.products.length} products</strong> across <strong style="color:var(--white)">${DB.categories.filter(c=>!c.parent).length} categories</strong>.</p>
      ${proactiveHint}
      <p style="margin-top:10px;font-size:13px;color:var(--muted)">What would you like to do?</p>`,
      ['Show me everything', 'What should I work on?', 'How\'s my data quality?', 'Help']
    );
  }, 150);

  // Focus the input
  document.getElementById('prompt-input').focus();
}

// ============ SEND HANDLER ============
function handleSend() {
  const input = document.getElementById('prompt-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  executeCommand(text);
}

document.getElementById('prompt-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

// ============ INIT ============
render();

// Welcome message on load

  const hour = new Date().getHours();

  if (lowQ > 0) proactiveHint += `<p style="margin-top:4px;font-size:13px;color:var(--orange)">⚠️ <strong>${lowQ} product${lowQ>1?'s':''}</strong> have low data quality — I can help enrich them.</p>`;

  addSystem(
    `<p><strong>${timeGreet}! 👋</strong></p>
    <p style="margin-top:6px;color:var(--muted)">I'm your AI product catalog assistant. Just talk to me naturally — ask questions, give instructions, or tell me what you need. I understand plain language.</p>
    <p style="margin-top:8px;color:var(--muted)">Your catalog: <strong style="color:var(--white)">${DB.products.length} products</strong> across <strong style="color:var(--white)">${DB.categories.filter(c=>!c.parent).length} categories</strong>.</p>
    ${proactiveHint}
    <p style="margin-top:10px;font-size:13px;color:var(--muted)">What would you like to do? Just type naturally, or try one of these:</p>`,
    ['Show me everything', 'What should I work on?', 'How\'s my data quality?', 'Help me get started']
  );
}, 300);
</script>
