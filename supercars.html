// ---------- the race ----------
STATES.race = {
  R: null, paused: false, pauseSel: 0,
  enter() {
    const trk = this.trkBaked = trackFor(roundNo());
    const humans = CAREER.players.filter(p => p.alive);
    if (!humans.length) { gotoState('gameover'); return; }
    const aiCount = 9 - humans.length;
    const aiCfg = AI_SETUP[CAREER.league];
    const cars = [];
    // AI fill the front slots — players earn their way through the pack
    for (let i = 0; i < aiCount; i++) {
      const [nm, col, shade] = ROSTER[i % ROSTER.length];
      const fr = (i / Math.max(1, aiCount - 1));
      const skill = lerp(aiCfg.skill[0], aiCfg.skill[1], 1 - fr) * (1 + CAREER.round * 0.013);
      cars.push(newCar(trk, i, {
        name: nm, frames: carFramesFor(col, shade), color: col,
        gear: { engine: CAREER.league, bumper: 1, armour: CAREER.league },
        inv: { missF: aiCfg.ammoF, missR: aiCfg.ammoR, homing: 0, mines: CAREER.league === 2 ? 2 : 0, spin: 0, turbo: CAREER.league ? 1 : 0 },
        eqR: CAREER.league === 2 ? 'mine' : 'std',
        skill, aggr: aiCfg.aggr
      }));
    }
    humans.forEach((p, i) => {
      const c = newCar(trk, aiCount + i, {
        isPlayer: true, pIdx: p.pIdx, name: p.name,
        frames: carFramesFor(P_COLORS[p.pIdx][0], P_COLORS[p.pIdx][1]),
        color: P_COLORS[p.pIdx][0],
        gear: p.gear, inv: p.inv, eqF: p.eqF, eqR: p.eqR,
        hp: p.hp, skill: 0, aggr: 0
      });
      c.maxHp = 100 + p.gear.armour * 50;
      c.career = p;
      cars.push(c);
      engineStart(p.pIdx);
    });
    this.R = {
      track: trk, cars, missiles: [], mines: [], parts: [], marks: [],
      time: 0, t: 0, started: false, phase: 'count', count: 3, overT: 0, result: null
    };
    this.paused = false;
    stopSong();
  },
  exit() { engineStop(0); engineStop(1); },
  key() {
    if (anyKeyPressed === 'Escape' || anyKeyPressed === 'KeyP') {
      this.paused = !this.paused; this.pauseSel = 0; sfx.ui();
    }
    if (this.paused) {
      if (navUp() || navDown()) { this.pauseSel = 1 - this.pauseSel; sfx.ui(); }
      if (navOk()) {
        sfx.sel();
        if (this.pauseSel === 0) this.paused = false;
        else { // quit race = DNF for all players still going
          for (const c of this.R.cars) if (c.isPlayer && !c.finished) { c.wrecked = true; c.dnf = true; }
          this.resolve();
        }
      }
    }
  },
  resolve() {
    const R = this.R;
    const order = [...R.cars].sort((a, b) => {
      if (a.finished && b.finished) return a.finishT - b.finishT;
      if (a.finished) return -1;
      if (b.finished) return 1;
      if (a.wrecked !== b.wrecked) return a.wrecked ? 1 : -1;
      return b.progress - a.progress;
    });
    order.forEach((c, i) => c.rank = i + 1);
    R.result = order;
    gotoState('results', { order });
  },
  update(dt) {
    const R = this.R; if (!R || this.paused) return;
    R.t += dt;
    if (R.phase === 'count') {
      const c = 3 - Math.floor(R.t);
      if (c !== R.count && c > 0) { R.count = c; sfx.beepLo(); }
      if (R.t >= 3.0) { R.phase = 'go'; R.started = true; sfx.beepHi(); }
      if (R.t < 0.05) sfx.beepLo();
    }
    if (R.started) R.time += dt;
    for (const c of R.cars) updateCar(c, dt, R);
    collideCars(dt, R);
    updateMissiles(dt, R);
    updateParticles(dt, R);
    // live ranks
    const order = [...R.cars].sort((a, b) => {
      if (a.finished && b.finished) return a.finishT - b.finishT;
      if (a.finished) return -1;
      if (b.finished) return 1;
      return b.progress - a.progress;
    });
    order.forEach((c, i) => c.rank = i + 1);
    // engines
    for (const c of R.cars) {
      if (!c.isPlayer) continue;
      engineUpdate(c.pIdx, clamp(c.speed / 230, 0, 1), !c.wrecked && !c.finished && R.started);
    }
    // race over?
    const humans = R.cars.filter(c => c.isPlayer);
    if (R.phase !== 'over' && humans.every(c => c.finished || c.wrecked)) {
      R.phase = 'over'; R.overT = 0;
    }
    if (R.phase === 'over') {
      R.overT += dt;
      if (R.overT > 1.6) this.resolve();
    }
  },
  drawViewport(car, vx, vy, vw, vh) {
    const R = this.R, trk = R.track;
    // zoomed camera: big chunky pixels like the Amiga original
    const two = R.cars.filter(c2 => c2.isPlayer).length > 1;
    const Z = two ? 1.5 : 2;
    const vwW = vw / Z, vhW = vh / Z;
    // look further ahead the faster you go (smoothed so the camera doesn't jerk)
    car.camL = lerp(car.camL == null ? 16 : car.camL, 14 + car.speed * 0.16, 0.08);
    const cx = clamp(car.x + Math.cos(car.h) * car.camL, vwW / 2, trk.w - vwW / 2);
    const cy = clamp(car.y + Math.sin(car.h) * car.camL, vhW / 2, trk.h - vhW / 2);
    ctx.save();
    ctx.beginPath(); ctx.rect(vx, vy, vw, vh); ctx.clip();
    ctx.translate(vx, vy);
    ctx.scale(Z, Z);
    // snap the camera to whole screen pixels to avoid shimmer
    const ox = Math.round((cx - vwW / 2) * Z) / Z;
    const oy = Math.round((cy - vhW / 2) * Z) / Z;
    ctx.translate(-ox, -oy);
    ctx.drawImage(trk.canvas, 0, 0);
    // skid marks
    ctx.fillStyle = 'rgba(20,20,26,0.5)';
    for (const m of R.marks) {
      ctx.save(); ctx.translate(Math.round(m.x), Math.round(m.y)); ctx.rotate(m.h);
      ctx.fillRect(-3, -4, 5, 2); ctx.fillRect(-3, 2, 5, 2);
      ctx.restore();
    }
    // mines
    for (const mn of R.mines) {
      ctx.fillStyle = '#28282e';
      ctx.beginPath(); ctx.arc(mn.x, mn.y, 4, 0, TAU); ctx.fill();
      if (mn.t > 1.0 && Math.floor(mn.t * 6) % 2) { ctx.fillStyle = '#d83028'; ctx.fillRect(Math.round(mn.x) - 1, Math.round(mn.y) - 1, 2, 2); }
    }
    // cars: wrecked husks under live cars
    const sorted = [...R.cars].sort((a, b) => (a.wrecked === b.wrecked) ? a.y - b.y : (a.wrecked ? -1 : 1));
    for (const c of sorted) drawCar(ctx, c);
    // missiles
    for (const m of R.missiles) {
      ctx.save(); ctx.translate(Math.round(m.x), Math.round(m.y)); ctx.rotate(m.h);
      ctx.fillStyle = m.homing ? '#f08018' : '#f0f0e8'; ctx.fillRect(-4, -1, 7, 2);
      ctx.fillStyle = '#f8d020'; ctx.fillRect(3, -1, 2, 2);
      ctx.restore();
    }
    // particles
    for (const p of R.parts) {
      if (p.kind === 'flash') {
        ctx.globalAlpha = 1 - p.t / p.life;
        ctx.fillStyle = p.col;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * (0.4 + p.t / p.life), 0, TAU); ctx.fill();
        ctx.globalAlpha = 1;
      } else {
        ctx.globalAlpha = clamp(1 - p.t / p.life, 0, 1);
        ctx.fillStyle = p.col;
        ctx.fillRect(Math.round(p.x), Math.round(p.y), p.sz, p.sz);
        ctx.globalAlpha = 1;
      }
    }
    ctx.restore();
    // per-viewport overlays (only needed in split screen — the 1P HUD shows POS/LAPS big)
    if (two) {
      const tag = car.pIdx === 0 ? 'P1' : 'P2';
      drawTextSh(ctx, tag, vx + 4, vy + 4, P_COLORS[car.pIdx][0], 1);
      drawTextSh(ctx, 'POS ' + car.rank + '/9', vx + 4, vy + 14, '#f0f0e8', 1);
      drawTextSh(ctx, 'LAP ' + Math.min(car.lap + 1, R.track.laps) + '/' + R.track.laps, vx + vw - 52, vy + 4, '#f0f0e8', 1);
    }
    if (car.finished) drawTextCSh(ctx, 'FINISHED ' + posName(car.rank) + '!', vx + vw / 2, vy + vh / 2 - 12, '#f8d020', 1);
    if (car.wrecked) drawTextCSh(ctx, 'WRECKED!', vx + vw / 2, vy + vh / 2 - 12, '#d83028', 2);
  },
  draw() {
    const R = this.R; if (!R) return;
    ctx.fillStyle = '#101018'; ctx.fillRect(0, 0, W, H);
    const humans = R.cars.filter(c => c.isPlayer);
    const vh = H - HUD_H;
    if (humans.length === 1) {
      this.drawViewport(humans[0], 0, 0, W, vh);
    } else {
      const half = Math.floor((vh - 2) / 2);
      this.drawViewport(humans[0], 0, 0, W, half);
      this.drawViewport(humans[1], 0, half + 2, W, half);
      ctx.fillStyle = '#06060a'; ctx.fillRect(0, half, W, 2);
    }
    // race time
    drawTextSh(ctx, fmtTime(R.time), W - 56, vh - 12, '#f0f0e8', 1);
    // countdown
    if (R.phase === 'count') {
      const n = 3 - Math.floor(R.t);
      panel(ctx, W / 2 - 30, 60, 60, 40, '#2a2a36');
      drawTextCSh(ctx, n > 0 ? String(n) : 'GO!', W / 2, 70, n > 0 ? '#d83028' : '#30a838', 3);
    } else if (R.started && R.time < 1.2) {
      drawTextCSh(ctx, 'GO!', W / 2, 70, '#30a838', 3);
    }
    this.drawHud(humans);
    if (this.paused) {
      ctx.fillStyle = 'rgba(10,10,16,0.75)'; ctx.fillRect(0, 0, W, H);
      panel(ctx, 90, 88, 140, 70);
      drawTextC(ctx, 'PAUSED', W / 2, 96, '#f8d020', 1);
      ['RESUME', 'QUIT RACE (DNF)'].forEach((s, i) => {
        if (i === this.pauseSel) { ctx.fillStyle = '#d83028'; ctx.fillRect(98, 112 + i * 16, 124, 12); }
        drawTextC(ctx, s, W / 2, 114 + i * 16, i === this.pauseSel ? '#f8f0a0' : '#c8c8d4', 1);
      });
    }
  },
  drawHud(humans) {
    const y0 = H - HUD_H;
    // wood-grain panel
    ctx.fillStyle = '#2a1a08'; ctx.fillRect(0, y0, W, HUD_H);
    ctx.fillStyle = '#c87830'; ctx.fillRect(2, y0 + 2, W - 4, HUD_H - 4);
    for (let yy = y0 + 3; yy < H - 3; yy += 3) {
      const ph = (yy - y0) % 9;
      ctx.fillStyle = ph < 3 ? '#bc6c2a' : ph < 6 ? '#cc7c34' : '#c27026';
      ctx.fillRect(2, yy, W - 4, 2);
    }
    ctx.fillStyle = '#e89848'; ctx.fillRect(2, y0 + 2, W - 4, 1);
    ctx.fillStyle = '#1a1004'; ctx.fillRect(2, H - 3, W - 4, 1);
    if (humans.length === 1) this.hudOne(humans[0], y0);
    else humans.forEach((c, i) => this.hudHalf(c, i * 160, y0));
  },
  hudBar(x, y, w, h, ratio, fill) {
    ctx.fillStyle = '#2a1a08'; ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
    ctx.fillStyle = '#101018'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = fill; ctx.fillRect(x, y, Math.round(w * clamp(ratio, 0, 1)), h);
  },
  ammoStr(c) {
    return (c.eqF === 'homing' ? 'H' + c.inv.homing : 'F' + c.inv.missF) +
      ' ' + (c.eqR === 'mine' ? 'X' + c.inv.mines : 'R' + c.inv.missR) +
      ' T' + c.inv.turbo + ' S' + c.inv.spin;
  },
  hudOne(c, y0) {
    const sh = '#5e3a18';
    drawTextCSh(ctx, 'SPEED', 48, y0 + 7, '#f0f0e8', 1, sh);
    this.hudBar(12, y0 + 19, 72, 8, c.speed / 215, '#3858c8');
    drawTextSh(ctx, this.ammoStr(c), 12, y0 + 33, '#f8e8c8', 1, sh);
    drawTextSh(ctx, money(c.career ? c.career.cash : 0), 12, y0 + 45, '#f8d020', 1, sh);
    drawTextCSh(ctx, 'POS', 124, y0 + 7, '#f0f0e8', 1, sh);
    drawTextCSh(ctx, posName(c.rank), 124, y0 + 19, '#f0f0e8', 2, sh);
    drawTextCSh(ctx, 'LAPS', 196, y0 + 7, '#f0f0e8', 1, sh);
    drawTextCSh(ctx, String(Math.max(0, this.R.track.laps - c.lap)), 196, y0 + 19, '#f0f0e8', 2, sh);
    drawTextCSh(ctx, 'RACE ' + (CAREER.round + 1) + '/7', 160, y0 + 45, '#f8e8c8', 1, sh);
    drawTextCSh(ctx, 'DAMAGE', 270, y0 + 7, '#f0f0e8', 1, sh);
    const hr = clamp(c.hp / c.maxHp, 0, 1);
    this.hudBar(232, y0 + 19, 76, 8, hr, hr > 0.5 ? '#30a838' : hr > 0.25 ? '#f8d020' : '#d83028');
    if (c.turboT > 0) drawTextCSh(ctx, 'TURBO!', 270, y0 + 33, '#48b8d0', 1, sh);
  },
  hudHalf(c, x0, y0) {
    const sh = '#5e3a18';
    ctx.fillStyle = P_COLORS[c.pIdx][0]; ctx.fillRect(x0 + 8, y0 + 7, 6, 6);
    drawTextSh(ctx, c.name, x0 + 18, y0 + 6, '#f0f0e8', 1, sh);
    drawTextSh(ctx, posName(c.rank), x0 + 90, y0 + 6, '#f8d020', 1, sh);
    drawTextSh(ctx, 'LAP' + Math.max(0, this.R.track.laps - c.lap), x0 + 122, y0 + 6, '#f0f0e8', 1, sh);
    drawTextSh(ctx, 'SPD', x0 + 8, y0 + 19, '#f8e8c8', 1, sh);
    this.hudBar(x0 + 32, y0 + 19, 48, 7, c.speed / 215, '#3858c8');
    drawTextSh(ctx, 'DMG', x0 + 88, y0 + 19, '#f8e8c8', 1, sh);
    const hr = clamp(c.hp / c.maxHp, 0, 1);
    this.hudBar(x0 + 112, y0 + 19, 40, 7, hr, hr > 0.5 ? '#30a838' : hr > 0.25 ? '#f8d020' : '#d83028');
    drawTextSh(ctx, this.ammoStr(c), x0 + 8, y0 + 32, '#f8e8c8', 1, sh);
    drawTextSh(ctx, money(c.career ? c.career.cash : 0), x0 + 8, y0 + 44, '#f8d020', 1, sh);
    if (c.turboT > 0) drawTextSh(ctx, 'TURBO!', x0 + 100, y0 + 44, '#48b8d0', 1, sh);
  }
};

function posName(n) {
  return n + (n === 1 ? 'ST' : n === 2 ? 'ND' : n === 3 ? 'RD' : 'TH');
}
function fmtTime(t) {
  const m = Math.floor(t / 60), s = Math.floor(t % 60), h = Math.floor((t * 100) % 100);
  return m + ':' + String(s).padStart(2, '0') + '.' + String(h).padStart(2, '0');
}

// ---------- career flow queue ----------
const FLOW = { steps: [] };
function buildFlow(order) {
  FLOW.steps = [];
  const alive = CAREER.players.filter(p => p.alive);
  if (!alive.length) { FLOW.steps.push({ state: 'gameover' }); return; }
  // interview for the best-placed surviving player
  const humansInOrder = order.filter(c => c.isPlayer && c.career && c.career.alive);
  if (humansInOrder.length) {
    const best = humansInOrder[0];
    if (best.rank <= 5) FLOW.steps.push({ state: 'interview', args: { player: best.career } });
  }
  for (const p of alive) FLOW.steps.push({ state: 'shop', args: { player: p } });
  if (CAREER.round === 6) {
    for (const p of alive) FLOW.steps.push({ state: 'dialog', args: { kind: 'police', player: p } });
    for (const p of alive) FLOW.steps.push({ state: 'dialog', args: { kind: 'tax', player: p } });
    FLOW.steps.push({ state: CAREER.league < 2 ? 'promo' : 'champion' });
  }
}
function flowNext() {
  const s = FLOW.steps.shift();
  if (s) { gotoState(s.state, s.args); return; }
  CAREER.round++;
  saveGame();
  gotoState('prerace');
}

// ---------- results ----------
STATES.results = {
  order: null, rows: null, t: 0,
  enter(a) {
    this.order = a.order; this.t = 0;
    this.rows = [];
    let anyWin = false, anyOut = false;
    this.order.forEach((c, i) => {
      const pos = i + 1;
      let winText = '';
      if (c.isPlayer && c.career) {
        const p = c.career;
        p.stats.races++;
        const qualified = !c.wrecked && !c.dnf && pos <= 5;
        if (qualified) {
          const win = Math.round(WINNINGS[pos - 1] * LEAGUE_MULT[CAREER.league]) + p.pop * 8;
          p.cash += win; p.stats.earned += win;
          p.pop = clamp(p.pop + (pos === 1 ? 6 : pos <= 3 ? 3 : 1), 0, 100);
          if (pos === 1) { p.stats.wins++; anyWin = true; }
          winText = '+' + money(win);
        } else {
          p.alive = false; anyOut = true;
          p.pop = clamp(p.pop - 5, 0, 100);
          winText = 'OUT!';
        }
        p.killsSince += c.kills; p.stats.kills += c.kills;
        p.hp = c.wrecked ? 60 : Math.max(1, c.hp);
      }
      this.rows.push({
        pos, name: c.name, color: c.color,
        time: c.finished ? fmtTime(c.finishT) : (c.wrecked ? 'WRECKED' : 'DNF'),
        winText, isPlayer: c.isPlayer
      });
    });
    if (anyWin) sfx.fanfare(); else if (anyOut) sfx.sadTrombone(); else sfx.kaching();
    stopSong();
    saveGame();
  },
  update(dt) { this.t += dt; },
  key() {
    if (navOk() && this.t > 0.8) { sfx.sel(); buildFlow(this.order); flowNext(); }
  },
  draw() {
    ctx.fillStyle = '#14141c'; ctx.fillRect(0, 0, W, H);
    panel(ctx, 8, 6, 304, 22);
    drawTextC(ctx, 'RACE RESULTS - ' + TRACKS[roundNo()].n, W / 2, 13, '#f8d020', 1);
    panel(ctx, 8, 32, 304, 182);
    this.rows.forEach((r, i) => {
      const y = 40 + i * 18;
      const shown = this.t > 0.15 * (i + 1);
      if (!shown) return;
      if (r.isPlayer) { ctx.fillStyle = 'rgba(216,48,40,0.25)'; ctx.fillRect(12, y - 2, 296, 14); }
      drawText(ctx, posName(r.pos), 16, y, r.pos <= 5 ? '#30a838' : '#d83028', 1);
      ctx.fillStyle = r.color; ctx.fillRect(48, y + 1, 6, 6);
      drawText(ctx, r.name, 58, y, r.isPlayer ? '#f8f0a0' : '#c8c8d4', 1);
      drawText(ctx, r.time, 178, y, r.time === 'WRECKED' ? '#d83028' : '#9898a8', 1);
      if (r.winText) drawText(ctx, r.winText, 240, y, r.winText === 'OUT!' ? '#d83028' : '#f8d020', 1);
      if (r.pos === 5) { ctx.fillStyle = '#f08018'; ctx.fillRect(12, y + 12, 296, 1); }
    });
    if (this.t > 1.6 && Math.floor(this.t * 2) % 2 === 0)
      drawTextC(ctx, 'PRESS FIRE TO CONTINUE', W / 2, 226, '#f8d020', 1);
    drawTextC(ctx, 'TOP 5 QUALIFY FOR THE NEXT RACE', W / 2, 240, '#7a7a96', 1);
  }
};

// ---------- shared conversation renderer ----------
function drawConvo(o) {
  ctx.fillStyle = '#14141c'; ctx.fillRect(0, 0, W, H);
  // backdrop motif
  ctx.fillStyle = '#1a1a26';
  for (let i = 0; i < 30; i++) ctx.fillRect((i * 37) % W, (i * 53) % 90, 18, 4);
  panel(ctx, 8, 8, 304, 20);
  drawTextC(ctx, o.title, W / 2, 14, '#f8d020', 1);
  // portrait
  panel(ctx, 14, 38, 86, 92);
  ctx.save();
  ctx.translate(18, 42); ctx.scale(3, 3);
  ctx.drawImage(o.portrait, 0, 0);
  ctx.restore();
  drawTextC(ctx, o.who, 57, 134, '#f0f0e8', 1);
  drawTextC(ctx, o.where, 57, 144, '#7a7a96', 1);
  // speech panel
  panel(ctx, 108, 38, 204, 92, '#2e2e3c');
  const words = o.text.split(' ');
  let line = '', ly = 46, shown = 0;
  const maxShown = o.chars == null ? 9999 : o.chars;
  for (const w2 of words) {
    if (shown >= maxShown) break;
    const tryLine = line ? line + ' ' + w2 : w2;
    if (textW(tryLine, 1) > 192) {
      drawText(ctx, line.slice(0, Math.max(0, maxShown - (shown - line.length))), 114, ly, '#f0f0e8', 1);
      ly += 11; line = w2;
    } else line = tryLine;
    shown += w2.length + 1;
  }
  if (line) drawText(ctx, line, 114, ly, '#f0f0e8', 1);
  // options / effect
  if (o.phase === 'choose') {
    panel(ctx, 14, 154, 298, 64);
    drawText(ctx, o.playerName + ' SAYS:', 20, 158, '#48b8d0', 1);
    o.opts.forEach((t, i) => {
      const y = 170 + i * 15;
      if (i === o.sel) { ctx.fillStyle = '#d83028'; ctx.fillRect(18, y - 2, 290, 12); }
      drawText(ctx, '"' + t + '"', 24, y, i === o.sel ? '#f8f0a0' : '#c8c8d4', 1);
    });
  } else if (o.phase === 'done') {
    panel(ctx, 14, 154, 298, 64);
    drawTextC(ctx, o.reply, W / 2, 164, '#f0f0e8', 1);
    if (o.effect) drawTextC(ctx, o.effect, W / 2, 186, o.effectBad ? '#d83028' : '#30a838', 1);
    drawTextC(ctx, 'PRESS FIRE', W / 2, 204, '#f8d020', 1);
  } else {
    drawTextC(ctx, 'PRESS FIRE', W / 2, 200, '#7a7a96', 1);
  }
  drawTextC(ctx, o.footer || '', W / 2, 240, '#7a7a96', 1);
}

// ---------- interview ----------
STATES.interview = {
  p: null, iv: null, tt: 0, sel: 0, phase: 'type', reply: '', effect: '', effectBad: false,
  enter(a) {
    this.p = a.player;
    let avail = INTERVIEWS.map((_, i) => i).filter(i => !CAREER.usedInterviews.includes(i));
    if (!avail.length) { CAREER.usedInterviews = []; avail = INTERVIEWS.map((_, i) => i); }
    const idx = avail[irnd(0, avail.length - 1)];
    CAREER.usedInterviews.push(idx);
    this.iv = INTERVIEWS[idx];
    this.tt = 0; this.sel = 0; this.phase = 'type';
    playSong('shop');
  },
  update(dt) {
    if (this.phase === 'type') {
      const before = Math.floor(this.tt);
      this.tt += dt * 30;
      if (Math.floor(this.tt) !== before && Math.floor(this.tt) % 3 === 0) sfx.type();
      if (this.tt >= this.iv.q.length) this.phase = 'choose';
    }
  },
  key() {
    if (this.phase === 'type' && anyKeyPressed) { this.tt = this.iv.q.length; this.phase = 'choose'; return; }
    if (this.phase === 'choose') {
      if (navUp()) { this.sel = (this.sel + 2) % 3; sfx.ui(); }
      if (navDown()) { this.sel = (this.sel + 1) % 3; sfx.ui(); }
      if (navOk()) {
        const [t, pop, cash] = this.iv.a[this.sel];
        this.p.pop = clamp(this.p.pop + pop, 0, 100);
        if (cash) this.p.cash += cash;
        this.reply = pop >= 5 ? 'THE CROWD GOES WILD!' : pop >= 0 ? 'PRISCILLA SCRIBBLES AWAY...' : 'OOF. THAT WILL READ BADLY.';
        this.effect = (pop >= 0 ? '+' : '') + pop + ' FAME' + (cash ? '  +' + money(cash) : '');
        this.effectBad = pop < 0;
        this.phase = 'done';
        if (pop >= 0) sfx.kaching(); else sfx.deny();
      }
    } else if (this.phase === 'done' && navOk()) { sfx.sel(); flowNext(); }
  },
  draw() {
    drawConvo({
      title: 'POST-RACE INTERVIEW', portrait: PORTRAITS.press,
      who: 'PRISCILLA PRESS', where: 'THE DAILY EXHAUST',
      text: this.iv.q, chars: this.phase === 'type' ? Math.floor(this.tt) : null,
      phase: this.phase, opts: this.iv.a.map(x => x[0]), sel: this.sel,
      reply: this.reply, effect: this.effect, effectBad: this.effectBad,
      playerName: this.p.name,
      footer: 'FAME PAYS: SPONSORS ADD £8 PER FAME POINT EVERY RACE'
    });
  }
};

// ---------- police & taxman ----------
STATES.dialog = {
  kind: '', p: null, tt: 0, sel: 0, phase: 'type', text: '', reply: '', effect: '', effectBad: false,
  enter(a) {
    this.kind = a.kind; this.p = a.player;
    if (this.kind === 'police' && this.p.killsSince < 2) { flowNext(); return; }
    if (this.kind === 'tax' && this.p.cash <= TAX_THRESHOLD) { flowNext(); return; }
    this.text = this.kind === 'police' ? POLICE.intro(this.p.killsSince) : TAXMAN.intro(this.p.cash);
    this.tt = 0; this.sel = 0; this.phase = 'type';
    playSong('shop');
    if (this.kind === 'police') sfx.siren();
  },
  update(dt) {
    if (this.phase === 'type') {
      const before = Math.floor(this.tt);
      this.tt += dt * 30;
      if (Math.floor(this.tt) !== before && Math.floor(this.tt) % 3 === 0) sfx.type();
      if (this.tt >= this.text.length) this.phase = 'choose';
    }
  },
  key() {
    const cfg = this.kind === 'police' ? POLICE : TAXMAN;
    if (this.phase === 'type' && anyKeyPressed) { this.tt = this.text.length; this.phase = 'choose'; return; }
    if (this.phase === 'choose') {
      if (navUp()) { this.sel = (this.sel + 2) % 3; sfx.ui(); }
      if (navDown()) { this.sel = (this.sel + 1) % 3; sfx.ui(); }
      if (navOk()) {
        const o = cfg.opts[this.sel];
        let cost = 0, popD = 0, caught = true;
        if (o.kind === 'gamble') caught = Math.random() > o.odds;
        if (o.kind === 'pay' || caught) {
          cost = this.kind === 'tax' ? Math.round(this.p.cash * o.pct) : Math.min(o.fine, this.p.cash);
          this.reply = (o.kind === 'gamble') ? o.bad : o.ok;
          if (caught && o.popHit) popD = o.popHit;
        } else {
          this.reply = o.ok;
        }
        if (o.popGain) popD = (popD || 0) + o.popGain;
        this.p.cash = Math.max(0, this.p.cash - cost);
        this.p.pop = clamp(this.p.pop + popD, 0, 100);
        this.effect = (cost ? '-' + money(cost) : 'NO CHARGE') + (popD ? '  ' + (popD > 0 ? '+' : '') + popD + ' FAME' : '');
        this.effectBad = cost > 0;
        if (this.kind === 'police') this.p.killsSince = 0;
        this.phase = 'done';
        if (cost > 0) sfx.deny(); else sfx.kaching();
      }
    } else if (this.phase === 'done' && navOk()) { sfx.sel(); saveGame(); flowNext(); }
  },
  draw() {
    const isCop = this.kind === 'police';
    drawConvo({
      title: isCop ? 'A WORD WITH THE LAW' : 'INLAND REVENUE SPOT CHECK',
      portrait: isCop ? PORTRAITS.cop : PORTRAITS.tax,
      who: isCop ? 'SGT. GRIDLOCK' : 'MR. LEDGER',
      where: isCop ? 'TRAFFIC DIVISION' : 'INLAND REVENUE',
      text: this.text, chars: this.phase === 'type' ? Math.floor(this.tt) : null,
      phase: this.phase, opts: (isCop ? POLICE : TAXMAN).opts.map(x => x.t), sel: this.sel,
      reply: this.reply, effect: this.effect, effectBad: this.effectBad,
      playerName: this.p.name,
      footer: isCop ? 'WRECK FEWER RIVALS TO AVOID ATTENTION' : 'BIG BANK BALANCES ATTRACT THE TAXMAN BETWEEN LEAGUES'
    });
  }
};

// ---------- the shop ----------

  flash(m) { this.msg = m; this.msgT = 1.6; },
  rows() { return SHOP_ITEMS.length + 1; }, // + EXIT
  priceFor(item, idx) {
    const tier = item.kind === 'gear' ? this.p.gear[item.id] : 0;
    if (item.kind === 'gear' && tier >= item.max) return null;
    return itemPrice(item, idx, roundNo(), tier);
  },
  key() {
    const p = this.p;
    if (navUp()) { this.sel = (this.sel - 1 + this.rows()) % this.rows(); sfx.ui(); }
    if (navDown()) { this.sel = (this.sel + 1) % this.rows(); sfx.ui(); }
    const onExit = this.sel === SHOP_ITEMS.length;
    if ((navOk() && onExit) || navBack()) {
      sfx.sel(); saveGame(); flowNext(); return;
    }
    if (onExit) return;
    const item = SHOP_ITEMS[this.sel], idx = this.sel;
    // toggle equips with any action key
    if (item.kind === 'equip') {
      if (navLeft() || navRight() || navOk()) {
        if (item.id === 'eqF') p.eqF = p.eqF === 'std' ? 'homing' : 'std';
        else p.eqR = p.eqR === 'std' ? 'mine' : 'std';
        sfx.ui();
      }
      return;
    }
    if (navRight() || (navOk() && !onExit)) { // buy
      const price = this.priceFor(item, idx);
      if (item.kind === 'gear') {
        if (price == null) { this.flash('MAXED OUT, CHAMP'); sfx.deny(); return; }
        if (p.cash < price) { this.flash('NOT ENOUGH DOSH'); sfx.deny(); return; }
        p.cash -= price; p.gear[item.id]++;
        if (item.id === 'armour') p.hp += 50;
        this.flash(item.name + ' MK' + p.gear[item.id] + ' FITTED'); sfx.kaching();
      } else if (item.kind === 'repair') {
        const maxHp = 100 + p.gear.armour * 50;
        const chunk = Math.min(10, maxHp - p.hp);
        if (chunk <= 0) { this.flash('NOTHING TO FIX'); sfx.deny(); return; }
        const cost = Math.round(chunk * item.base * LEAGUE_MULT[CAREER.league]);
        if (p.cash < cost) { this.flash('NOT ENOUGH DOSH'); sfx.deny(); return; }
        p.cash -= cost; p.hp += chunk;
        this.flash('+' + Math.round(chunk) + ' HULL'); sfx.kaching();
      } else {
        if (p.inv[item.id] >= item.max) { this.flash('NO ROOM IN THE BOOT'); sfx.deny(); return; }
        if (p.cash < price) { this.flash('NOT ENOUGH DOSH'); sfx.deny(); return; }
        p.cash -= price; p.inv[item.id]++;
        sfx.kaching();
      }
    }
    if (navLeft()) { // sell
      if (item.kind === 'ammo') {
        if (p.inv[item.id] <= 0) { this.flash('NOTHING TO SELL'); sfx.deny(); return; }
        const refund = Math.round(itemPrice(item, idx, roundNo(), 0) * 0.9);
        p.inv[item.id]--; p.cash += refund;
        this.flash('SOLD FOR ' + money(refund)); sfx.kaching();
      } else if (item.kind === 'gear') {
        const tier = p.gear[item.id];
        if (tier <= 0) { this.flash('NOTHING FITTED'); sfx.deny(); return; }
        const refund = Math.round(itemPrice(item, idx, roundNo(), tier - 1) * 0.6);
        p.gear[item.id]--; p.cash += refund;
        if (item.id === 'armour') {
          const maxHp = 100 + p.gear.armour * 50;
          p.hp = Math.min(p.hp, maxHp);
        }
        this.flash('SOLD FOR ' + money(refund)); sfx.kaching();
      } else if (item.kind === 'repair') {
        this.flash('CANNOT SELL DENTS'); sfx.deny();
      }
    }
  },
  update(dt) {
    this.msgT = Math.max(0, this.msgT - dt);
    this.qx += dt * 40;
  },
  draw() {
    const p = this.p;
    ctx.fillStyle = '#1a1620'; ctx.fillRect(0, 0, W, H);
    // header
    panel(ctx, 8, 6, 304, 30, '#3a2a1a', '#6a4e2e', '#1a120a');
    drawText(ctx, "HONEST RON'S DISCOUNT AUTOS", 16, 10, '#f8d020', 1);
    drawText(ctx, p.name + '  ' + money(p.cash), 16, 22, '#f0f0e8', 1);
    ctx.save();
    ctx.translate(266, 8); ctx.scale(1, 1);
    ctx.drawImage(PORTRAITS.ron, 0, 0, 26, 26);
    ctx.restore();
    // quip ticker
    const qw = textW(this.quip, 1) + 80;
    const qoff = Math.floor(this.qx) % qw;
    panelIn(ctx, 8, 40, 304, 13, '#0e0a08');
    ctx.save(); ctx.beginPath(); ctx.rect(10, 41, 300, 11); ctx.clip();
    drawText(ctx, this.quip, 312 - qoff, 43, '#f08018', 1);
    ctx.restore();
    // item list
    panel(ctx, 8, 57, 196, 174);
    SHOP_ITEMS.forEach((item, i) => {
      const y = 61 + i * 13;
      const seld = i === this.sel;
      if (seld) { ctx.fillStyle = '#203068'; ctx.fillRect(11, y - 1, 190, 11); }
      let owned = '';
      if (item.kind === 'gear') owned = 'MK' + p.gear[item.id];
      else if (item.kind === 'ammo') owned = 'X' + p.inv[item.id];
      else if (item.id === 'eqF') owned = p.eqF === 'homing' ? 'HOM' : 'STD';
      else if (item.id === 'eqR') owned = p.eqR === 'mine' ? 'MIN' : 'STD';
      drawText(ctx, item.name, 14, y, seld ? '#f8f0a0' : '#c8c8d4', 1);
      drawText(ctx, owned, 116, y, '#48b8d0', 1);
      const price = this.priceFor(item, i);
      if (item.kind === 'equip') drawText(ctx, 'SWAP', 148, y, '#9898a8', 1);
      else if (price == null) drawText(ctx, 'MAX', 148, y, '#7a7a96', 1);
      else {
        let col = '#f0f0e8';
        if (item.kind === 'ammo') {
          const f = marketFactor(roundNo(), i);
          col = f < 0.9 ? '#48b8d0' : f > 1.18 ? '#d83028' : '#f0f0e8';
        }
        drawText(ctx, money(price), 142, y, col, 1);
      }
    });
    const ey = 61 + SHOP_ITEMS.length * 13;
    if (this.sel === SHOP_ITEMS.length) { ctx.fillStyle = '#d83028'; ctx.fillRect(11, ey - 1, 190, 11); }
    drawText(ctx, 'LEAVE THE SHOP', 14, ey, this.sel === SHOP_ITEMS.length ? '#f8f0a0' : '#f8d020', 1);
    // right info panel
    panel(ctx, 210, 57, 102, 174);
    drawTextC(ctx, 'YOUR MOTOR', 261, 62, '#f8d020', 1);
    const maxHp = 100 + p.gear.armour * 50;
    drawText(ctx, 'HULL', 216, 76, '#9898a8', 1);
    panelIn(ctx, 216, 85, 90, 9, '#1a1a24');
    const hr = clamp(p.hp / maxHp, 0, 1);
    ctx.fillStyle = hr > 0.5 ? '#30a838' : hr > 0.25 ? '#f08018' : '#d83028';
    ctx.fillRect(217, 86, Math.round(88 * hr), 7);
    drawText(ctx, Math.round(p.hp) + '/' + maxHp, 216, 97, '#f0f0e8', 1);
    drawText(ctx, 'ENGINE MK' + p.gear.engine, 216, 112, '#c8c8d4', 1);
    drawText(ctx, 'BUMPER MK' + p.gear.bumper, 216, 123, '#c8c8d4', 1);
    drawText(ctx, 'ARMOUR MK' + p.gear.armour, 216, 134, '#c8c8d4', 1);
    drawText(ctx, 'FAME ' + p.pop, 216, 145, '#48b8d0', 1);
    // selected item description
    const selItem = SHOP_ITEMS[this.sel];
    panelIn(ctx, 214, 158, 94, 46, '#16161e');
    const desc = selItem ? selItem.desc : 'SEE YOU ON THE GRID.';
    let line = '', ly = 162;
    for (const w2 of desc.split(' ')) {
      const t2 = line ? line + ' ' + w2 : w2;
      if (textW(t2, 1) > 86) { drawText(ctx, line, 218, ly, '#9898a8', 1); ly += 10; line = w2; }
      else line = t2;
    }
    drawText(ctx, line, 218, ly, '#9898a8', 1);
    drawTextC(ctx, 'PRICES VARY', 261, 208, '#f08018', 1);
    drawTextC(ctx, 'CHEAP', 234, 219, '#48b8d0', 1);
    drawTextC(ctx, 'DEAR', 286, 219, '#d83028', 1);
    // hint / flash bar
    panel(ctx, 8, 236, 304, 16);
    if (this.msgT > 0) drawTextC(ctx, this.msg, W / 2, 240, '#f8d020', 1);
    else drawTextC(ctx, 'RIGHT=BUY  LEFT=SELL  ESC=LEAVE', W / 2, 240, '#c8c8d4', 1);
  }
};

// ---------- promotion ----------
STATES.promo = {
  t: 0,
  enter() {
    CAREER.league++; CAREER.round = 0;
    for (const p of CAREER.players) p.killsSince = 0;
    snapshotLeague(); saveGame();
    this.t = 0;
    sfx.fanfare();
    playSong('title');
  },
  update(dt) { this.t += dt; },
  key() { if (navOk() && this.t > 1) { sfx.sel(); gotoState('prerace'); } },
  draw() {
    ctx.fillStyle = '#14141c'; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 24; i++) {
      const a = this.t * 1.5 + i * TAU / 24;
      ctx.fillStyle = RAINBOW[i % RAINBOW.length];
      ctx.fillRect(W / 2 + Math.cos(a) * 130 - 1, 110 + Math.sin(a) * 90 - 1, 3, 3);
    }
    drawTextCSh(ctx, 'PROMOTED!', W / 2, 70, '#f8d020', 3);
    drawTextC(ctx, 'WELCOME TO ' + LEAGUE_NAMES[CAREER.league], W / 2, 110, '#f0f0e8', 1);
    drawTextC(ctx, CAREER.league === 1 ? 'DESERT TRACKS. RIVALS NOW SHOOT BACK.' : 'ICE AND SNOW. RIVALS DROP MINES. GOOD LUCK.', W / 2, 128, '#f08018', 1);
    CAREER.players.filter(p => p.alive).forEach((p, i) => {
      drawTextC(ctx, p.name + ': ' + money(p.cash) + '  FAME ' + p.pop, W / 2, 150 + i * 14, '#c8c8d4', 1);
    });
    if (this.t > 1 && Math.floor(this.t * 2) % 2 === 0)
      drawTextC(ctx, 'PRESS FIRE', W / 2, 200, '#f8d020', 1);
  }
};

// ---------- game over ----------
STATES.gameover = {
  sel: 0, t: 0,
  enter() { this.sel = 0; this.t = 0; stopSong(); sfx.sadTrombone(); },
  update(dt) { this.t += dt; },
  key() {
    if (navUp() || navDown()) { this.sel = 1 - this.sel; sfx.ui(); }
    if (navOk() && this.t > 0.8) {
      sfx.sel();
      if (this.sel === 0) {
        restoreLeague();
        saveGame();
        gotoState('prerace');
      } else { clearSave(); gotoState('title'); }
    }
  },
  draw() {
    ctx.fillStyle = '#14141c'; ctx.fillRect(0, 0, W, H);
    drawTextCSh(ctx, 'OUT OF THE', W / 2, 50, '#d83028', 3);
    drawTextCSh(ctx, 'CHAMPIONSHIP', W / 2, 78, '#d83028', 3);
    drawTextC(ctx, 'FINISH TOP 5 OR FINISH NOWHERE. THEM\'S THE RULES.', W / 2, 112, '#9898a8', 1);
    CAREER.players.forEach((p, i) => {
      drawTextC(ctx, p.name + ': ' + p.stats.races + ' RACES, ' + p.stats.wins + ' WINS, ' + money(p.stats.earned) + ' EARNED', W / 2, 130 + i * 12, '#c8c8d4', 1);
    });
    ['RETRY THIS LEAGUE', 'BACK TO TITLE'].forEach((s, i) => {
      const y = 170 + i * 18;
      if (i === this.sel) { ctx.fillStyle = '#d83028'; ctx.fillRect(70, y - 3, 180, 14); }
      drawTextC(ctx, s, W / 2, y, i === this.sel ? '#f8f0a0' : '#c8c8d4', 1);
    });
  }
};

// ---------- champion ----------
STATES.champion = {
  t: 0, parts: [],
  enter() {
    this.t = 0; this.parts = [];
    clearSave();
    playSong('title');
    sfx.fanfare();
  },
  update(dt) {
    this.t += dt;
    if (Math.random() < 0.12) {
      const x = rnd(30, W - 30), y = rnd(20, 120);
      for (let i = 0; i < 16; i++) {
        const a = rnd(0, TAU), sp = rnd(15, 60);
        this.parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: rnd(0.4, 0.9), t: 0, col: pick(RAINBOW) });
      }
    }
    for (const p of this.parts) { p.t += dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 20 * dt; }
    this.parts = this.parts.filter(p => p.t < p.life);
  },
  key() { if (navOk() && this.t > 2) { sfx.sel(); gotoState('title'); } },
  draw() {
    ctx.fillStyle = '#0a0a1e'; ctx.fillRect(0, 0, W, H);
    for (const p of this.parts) {
      ctx.globalAlpha = 1 - p.t / p.life; ctx.fillStyle = p.col;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 2);
      ctx.globalAlpha = 1;
    }
    ctx.save(); ctx.translate(W / 2 - 33, 24); ctx.scale(3, 3); ctx.drawImage(TROPHY, 0, 0); ctx.restore();
    drawTextCSh(ctx, 'SUPER CARS CHAMPION!', W / 2, 100, '#f8d020', 2);
    const alive = CAREER.players.filter(p => p.alive);
    alive.forEach((p, i) => {
      const y = 130 + i * 36;
      drawTextC(ctx, p.name, W / 2, y, P_COLORS[p.pIdx][0], 1);
      drawTextC(ctx, p.stats.wins + ' WINS - ' + p.stats.kills + ' WRECKS - ' + money(p.stats.earned) + ' CAREER EARNINGS', W / 2, y + 11, '#c8c8d4', 1);
      drawTextC(ctx, 'FINAL BALANCE ' + money(p.cash) + ' - FAME ' + p.pop, W / 2, y + 21, '#9898a8', 1);
    });
    drawTextC(ctx, 'ALL 21 RACES SURVIVED. PUT THE KETTLE ON.', W / 2, 214, '#48b8d0', 1);
    if (this.t > 2 && Math.floor(this.t * 2) % 2 === 0)
      drawTextC(ctx, 'PRESS FIRE', W / 2, 232, '#f8d020', 1);
  }
};

// ---------- main loop ----------
let lastTs = performance.now(), acc = 0;
function frame(ts) {
  requestAnimationFrame(frame);
  const dt = Math.min(0.1, (ts - lastTs) / 1000); lastTs = ts;
  acc += dt;
  const st = STATES[STATE];
  if (st.key) st.key();
  let steps = 0;
  while (acc >= 1 / 60 && steps < 4) {
    if (st.update) st.update(1 / 60);
    acc -= 1 / 60; steps++;
  }
  if (acc > 0.25) acc = 0;
  if (st.draw) st.draw();
  anyKeyPressed = null;
}

// ---------- debug / test hooks ----------
window.SC2T = {
  get state() { return STATE; },
  get career() { return CAREER; },
  get race() { return STATES.race.R; },
  goto: gotoState,
  cheat: {
    cash(n) { CAREER.players.forEach(p => p.cash += (n || 10000)); },
    finish(pos) {
      pos = pos || 1;
      const R = STATES.race.R; if (!R) return;
      const humans = R.cars.filter(c => c.isPlayer);
      const ai = R.cars.filter(c => !c.isPlayer);
      let hi = 0, ais = 0;
      for (let i = 1; i <= R.cars.length; i++) {
        const useHuman = (i >= pos && hi < humans.length);
        const c = useHuman ? humans[hi++] : ai[ais++];
        if (!c) continue;
        c.finished = true; c.finishT = 60 + i; c.wrecked = false;
      }
      STATES.race.resolve();
    }
  }
};

gotoState('title');
requestAnimationFrame(frame);
</script>
